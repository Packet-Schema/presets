# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: RTCP SDES
rowBits: 32
byteOrder: BE
description: "RTCP Source Description (SDES) packet, PT=202 (RFC 3550 §6.5). Carries descriptive information about RTP session participants. The fixed 4-byte common header is followed by one or more Source Chunks, each consisting of a 32-bit SSRC/CSRC identifier and a variable-length list of SDES items terminated by an END item (type=0). At least one CNAME item (type=1) MUST be included in every SDES packet to permanently identify a source across session boundaries."
body:
  - kind: group
    id: rtcpSdesHeader
    name: Common Header
    children:
      - id: v
        name: Version
        type: { kind: int, bits: 2 }
        category: type
        const: 2
        doc: "RTCP version number; MUST be 2. Packets with any other version value MUST be ignored. [RFC 3550 §6.1]"
      - id: p
        name: Padding
        type: { kind: int, bits: 1 }
        category: flags
        doc: "Padding flag. If set, the packet contains additional padding octets at the end that are not part of the payload; the last octet holds the count of padding bytes. [RFC 3550 §6.1]"
      - id: sc
        name: Source Count
        type: { kind: int, bits: 5 }
        category: length
        doc: "Number of SSRC/CSRC chunks contained in this SDES packet. Zero is valid (e.g. in a compound packet). [RFC 3550 §6.5]"
  - id: pt
    name: Packet Type
    type: { kind: int, bits: 8 }
    category: type
    const: 202
    doc: "RTCP packet type; value 202 (0xCA) identifies a Source Description packet. [RFC 3550 §6.5]"
  - id: length
    name: Length
    type: { kind: int, bits: 16 }
    category: length
    doc: "Length of this RTCP packet in 32-bit words minus one, including the header and any padding. [RFC 3550 §6.4.1]"
  - kind: repeat
    id: rtcpSdesChunks
    name: Source Chunks
    category: variable
    count: { kind: ref, field: "sc" }
    element:
      id: rtcpSdesChunk
      fields:
        - id: ssrc
          name: SSRC / CSRC
          type: { kind: int, bits: 32 }
          category: identifier
          doc: "Synchronization Source (SSRC) or Contributing Source (CSRC) identifier of the participant described by the following SDES items. Uniquely identifies the source within an RTP session. [RFC 3550 §6.5]"
        - kind: repeat
          id: rtcpSdesItems
          name: SDES Items
          category: variable
          count:
            until:
              kind: op
              op: "=="
              a: { kind: ref, field: "rtcpSdesItemType" }
              b: { kind: lit, value: 0 }
          element:
            id: rtcpSdesItem
            fields:
              - id: rtcpSdesItemType
                name: Item Type
                type:
                  kind: enum
                  bits: 8
                  variants:
                    0: "END"
                    1: "CNAME"
                    2: "NAME"
                    3: "EMAIL"
                    4: "PHONE"
                    5: "LOC"
                    6: "TOOL"
                    7: "NOTE"
                    8: "PRIV"
                category: type
                doc: "SDES item type code. 0=END terminates the item list for this chunk (no Length or Value octets follow); 1=CNAME canonical end-point identifier (MUST be present in every SDES packet); 2=NAME user name; 3=EMAIL email address; 4=PHONE phone number; 5=LOC geographic location; 6=TOOL application name; 7=NOTE note about source; 8=PRIV private extensions. The item list ends at the first END item. [RFC 3550 §6.5.1–6.5.8]"
              - kind: switch
                id: rtcpSdesItemBody
                on: { kind: ref, field: "rtcpSdesItemType" }
                cases:
                  "0":
                    id: rtcpSdesEnd
                    fields: []
                  _:
                    id: rtcpSdesData
                    fields:
                      - id: rtcpSdesItemLen
                        name: Item Length
                        type: { kind: int, bits: 8 }
                        category: length
                        doc: "Length of the Item Value field in octets. Present only for non-END items. Maximum 255 octets per item. [RFC 3550 §6.5]"
                      - id: rtcpSdesItemValue
                        name: Item Value
                        type: { kind: bytes, n: { kind: ref, field: "rtcpSdesItemLen" } }
                        category: variable
                        doc: "Item value as a UTF-8 encoded string without a null terminator. Length is given by the preceding Item Length field. For CNAME, SHOULD be in the form 'user@host' and MUST be unique across all participants. [RFC 3550 §6.5.1]"
        - kind: align
          to: 32
          fill: 0
          doc: "Each SDES chunk is padded with null (END) octets to the next 32-bit boundary; the first octet after the item list is the terminating END item already parsed above, and any further padding aligns the chunk so the next SSRC/CSRC begins on a 32-bit boundary. [RFC 3550 §6.5]"
