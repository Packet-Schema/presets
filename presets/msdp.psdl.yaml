# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: MSDP Message
rowBits: 32
byteOrder: BE
description: >-
  Multicast Source Discovery Protocol (MSDP) message (RFC 3618). MSDP runs over TCP port 639 between Rendezvous Points (RPs) to advertise active multicast sources across PIM-SM domain boundaries. Each message starts with a 1-octet Type field, a 2-octet Length field (total including header), and a variable-length body whose structure depends on the Type. Defined types are 1=Source-Active (SA), 2=SA-Request, 3=SA-Response, 4=KeepAlive, 5=Reserved (previously Notification). Only the SA (type 1) and KeepAlive (type 4) formats are normatively specified in RFC 3618; the SA-Request/SA-Response layouts follow the historical draft-ietf-msdp-spec. The SA message is the core of MSDP: it carries one or more (S,G) entries together with the originating RP address and optional encapsulated data packets.
meta:
  family: msdp
  tags: [application, tcp-based, multicast, control-plane, signaling]

body:
  - id: msdpType
    name: Type
    type:
      kind: enum
      bits: 8
      variants:
        1: "Source-Active"
        2: "SA-Request"
        3: "SA-Response"
        4: "KeepAlive"
        5: "Reserved (Previously: Notification)"
        6: "MSDP traceroute in progress"
        7: "MSDP traceroute reply"
    category: type
    doc: MSDP message type. 1=Source-Active (SA) — carries (S,G) state from an RP; 2=SA-Request — peer requests cached SA entries for a specific group; 3=SA-Response — replies to an SA-Request with matching SA entries; 4=KeepAlive — maintains the TCP session when no SA traffic is flowing; 5=Reserved (previously Notification — never standardised; the Notification message from the MSDP drafts was withdrawn before RFC 3618). Types 1 and 4 are the only message formats normatively specified in RFC 3618; the type 2 / type 3 layouts below follow the historical draft-ietf-msdp-spec format. Types 6 (MSDP traceroute in progress) and 7 (MSDP traceroute reply) are assigned by RFC 3618 §12.2 but their formats are not described in that memo. [RFC 3618 §12.2]

  - id: msdpLength
    name: Length
    type: { kind: int, bits: 16 }
    category: length
    defaultValue: 3
    doc: Total length of the MSDP message in octets, including this 3-octet Type+Length header (Type 1 B + Length 2 B). RFC 3618 §12.1 requires a minimum length of 4 octets for every message except KeepAlive, whose length is exactly 3. For an SA message the length is 3 + 5 (1-octet Entry Count + 4-octet RP Address) + N * 12 (each (S,G) entry is Reserved 3 B + Sprefix-len 1 B + Group Address 4 B + Source Address 4 B). [RFC 3618 §2, §12.1]

  - kind: switch
    id: msdpBody
    on: { kind: ref, field: msdpType }
    cases:
      "1":
        id: msdpSA
        fields:
          - id: msdpSAEntryCount
            name: Entry Count
            type: { kind: int, bits: 8 }
            category: length
            doc: Number of (S,G) entries carried in this SA message. Each entry is 12 octets (Reserved 3 B + Sprefix-len 1 B + Group Address 4 B + Source Address 4 B). A single SA message MUST NOT exceed the TCP MSS; if more entries are needed they are sent in multiple SA messages. [RFC 3618 §12.2.1]

          - id: msdpRPAddress
            name: RP Address
            type: { kind: int, bits: 32 }
            category: addressing
            doc: IPv4 address of the originating RP that is advertising the (S,G) state. Receiving peers use this address to perform RPF checks — the SA MUST arrive on the interface toward this RP in the unicast routing table. [RFC 3618 §12.2.1]

          - kind: repeat
            id: msdpSAEntries
            name: SA Entries
            element:
              id: msdpSAEntry
              fields:
                - id: msdpEntryReserved
                  name: Reserved
                  type: { kind: bits, n: 24 }
                  category: reserved
                  doc: Reserved bits. Senders MUST set to zero; receivers MUST ignore. [RFC 3618 §12.2.1]

                - id: msdpSprfxLen
                  name: Sprefix-len
                  type: { kind: int, bits: 8 }
                  category: length
                  doc: Length in bits of the significant prefix in the Source Address field. For a host source this is 32; smaller values indicate an aggregated source prefix (not common in practice). [RFC 3618 §12.2.1]

                - id: msdpGroupAddress
                  name: Group Address
                  type: { kind: int, bits: 32 }
                  category: addressing
                  doc: IPv4 multicast group address (G) of the active (S,G) entry. MUST be in the 224.0.0.0/4 range. [RFC 3618 §12.2.1]

                - id: msdpSourceAddress
                  name: Source Address
                  type: { kind: int, bits: 32 }
                  category: addressing
                  doc: IPv4 unicast address of the multicast source (S) that is sending traffic to the group. The significant portion is indicated by msdpSprfxLen. [RFC 3618 §12.2.1]
            count: { kind: ref, field: msdpSAEntryCount }

          - id: msdpSAEncapData
            name: Encapsulated Data
            type:
              kind: bytes
              n:
                kind: op
                op: "-"
                a:
                  kind: op
                  op: "-"
                  a:
                    kind: op
                    op: "-"
                    a: { kind: ref, field: msdpLength }
                    b: { kind: lit, value: 8 }
                  b:
                    kind: op
                    op: "*"
                    a: { kind: lit, value: 12 }
                    b: { kind: ref, field: msdpSAEntryCount }
                b: { kind: lit, value: 0 }
            category: variable
            doc: >-
              Optional encapsulated IPv4 multicast data packet (the "Length y" portion of the SA TLV). If 0, no data is encapsulated; otherwise a complete IPv4 packet follows and y equals the Total Length field in that packet's IP header. Only the last (S,G) entry in an SA message may carry encapsulated data. Length is the remaining octets after the control information: msdpLength minus the 3-octet Type+Length header minus the 5-octet (Entry Count + RP Address) minus 12 octets per (S,G) entry — equivalently msdpLength - 8 - 12*Entry Count, where the 8 octets are the first two 32-bit quantities (Type+Length+Entry Count and RP Address) counted from the start of the TLV. [RFC 3618 §12.2.1]

      "2":
        id: msdpSARequest
        fields:
          - id: msdpReqReserved
            name: Reserved
            type: { kind: bits, n: 8 }
            category: reserved
            doc: Reserved octet in the SA-Request message. Senders MUST set to zero; receivers MUST ignore. [draft-ietf-msdp-spec §SA-Request; not specified in RFC 3618]

          - id: msdpReqGroupAddress
            name: Group Address
            type: { kind: int, bits: 32 }
            category: addressing
            doc: The multicast group address for which the requesting peer wants to receive cached SA entries. The peer will respond with a SA-Response (type 3) containing all matching (S,G) states from its SA cache. [draft-ietf-msdp-spec §SA-Request; not specified in RFC 3618]

      "3":
        id: msdpSAResponse
        fields:
          - id: msdpRespEntryCount
            name: Entry Count
            type: { kind: int, bits: 8 }
            category: length
            doc: Number of (S,G) entries in this SA-Response message. SA-Response uses the same (S,G) entry format as SA (type 1). [draft-ietf-msdp-spec §SA-Response; not specified in RFC 3618]

          - id: msdpRespRPAddress
            name: RP Address
            type: { kind: int, bits: 32 }
            category: addressing
            doc: IPv4 address of the RP that originates the SA-Response. Semantics are identical to the RP Address field in a Source-Active (type 1) message. [draft-ietf-msdp-spec §SA-Response; not specified in RFC 3618]

          - kind: repeat
            id: msdpRespSAEntries
            name: SA Entries
            element:
              id: msdpRespSAEntry
              fields:
                - id: msdpRespEntryReserved
                  name: Reserved
                  type: { kind: bits, n: 24 }
                  category: reserved
                  doc: Reserved bits. Senders MUST set to zero; receivers MUST ignore. [draft-ietf-msdp-spec §SA-Response; not specified in RFC 3618]

                - id: msdpRespSprfxLen
                  name: Sprefix-len
                  type: { kind: int, bits: 8 }
                  category: length
                  doc: Length in bits of the significant prefix in the Source Address field. Semantics identical to the Sprefix-len field in SA (type 1) entries. [draft-ietf-msdp-spec §SA-Response; not specified in RFC 3618]

                - id: msdpRespGroupAddress
                  name: Group Address
                  type: { kind: int, bits: 32 }
                  category: addressing
                  doc: IPv4 multicast group address (G) of the (S,G) entry being responded. MUST be in the 224.0.0.0/4 range. [draft-ietf-msdp-spec §SA-Response; not specified in RFC 3618]

                - id: msdpRespSourceAddress
                  name: Source Address
                  type: { kind: int, bits: 32 }
                  category: addressing
                  doc: IPv4 unicast source address (S) of the (S,G) entry being responded. Significant bits are indicated by msdpRespSprfxLen. [draft-ietf-msdp-spec §SA-Response; not specified in RFC 3618]
            count: { kind: ref, field: msdpRespEntryCount }

      "4":
        id: msdpKeepAlive
        fields: []

      "5":
        id: msdpNotification
        fields:
          - id: msdpNotifBody
            name: Reserved Body
            type:
              kind: bytes
              n:
                kind: op
                op: "-"
                a: { kind: ref, field: msdpLength }
                b: { kind: lit, value: 3 }
            category: variable
            doc: Body of a type-5 message. Type 5 is Reserved in RFC 3618 §12.2 (previously the experimental Notification message, which was never standardised). RFC 3618 specifies no format for it, so the body is parsed as opaque bytes of length msdpLength minus the 3-octet Type+Length header. [RFC 3618 §12.2]

      "_":
        id: msdpUnknown
        fields:
          - id: msdpUnknownBody
            name: Unknown Body
            type:
              kind: bytes
              n:
                kind: op
                op: "-"
                a: { kind: ref, field: msdpLength }
                b: { kind: lit, value: 3 }
            category: variable
            doc: Raw body bytes for unrecognised MSDP message types, length computed as msdpLength minus the 3-byte Type+Length header. [RFC 3618 §4]
