# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: CoAP Message
rowBits: 32
byteOrder: BE
description: Constrained Application Protocol message (RFC 7252). A 4-byte fixed header — Version (always 1), Type (CON/NON/ACK/RST), Token Length (0..8; 9..15 are reserved and MUST be treated as a message format error), Code (3-bit Class + 5-bit Detail, e.g. 0.01 GET, 2.05 Content, 4.04 Not Found), and Message ID — followed by a Token of TKL bytes, a chain of TLV Options ordered by absolute Option Number via delta encoding (Uri-Path=11, Content-Format=12, Uri-Query=15, ETag=4, Observe=6 etc.), and (optionally) a 0xFF Payload Marker plus the message Payload. Each option is prefixed by a 1-byte (Delta<<4 | Length) header; when either nibble is 13 or 14 a 1- or 2-byte extension field carries the high part of that value (13/14 sentinels are unpacked with a switch on the 4-bit nibble per the §3 CoAP note), and the literal value is base+13 or base+269 respectively. The option chain ends either at the end of the datagram or at a 0xFF Payload Marker (Delta=15, Length=15) which is itself not an option; the options repeat therefore terminates on a peek of 0xFF (or end-of-stream), and the marker plus the Payload (running to end-of-datagram) follow as an optional region.

body:
  - kind: group
    id: coapHeader
    name: CoAP Fixed Header
    children:
      - id: version
        name: Ver
        type: { kind: int, bits: 2 }
        category: type
        defaultValue: 1
        doc: CoAP version. MUST be 1 (binary 01) for this specification; messages with any other Version MUST be silently ignored. [RFC 7252 §3]
      - id: type
        name: T
        type:
          kind: enum
          bits: 2
          variants:
            0: CON (Confirmable)
            1: NON (Non-confirmable)
            2: ACK (Acknowledgement)
            3: RST (Reset)
        category: type
        defaultValue: 0
        doc: "Message Type. 0=Confirmable (carries a request/response that MUST be acknowledged), 1=Non-confirmable (best-effort), 2=Acknowledgement (matched by Message ID to a prior CON), 3=Reset (rejects a message whose context is lost). [RFC 7252 §3 / §4]"
      - id: tkl
        name: TKL
        type: { kind: int, bits: 4 }
        category: length
        defaultValue: 0
        doc: "Token Length in bytes. Valid range 0..8; values 9..15 are reserved and MUST be processed as a message format error. The Token field that follows the fixed header is exactly TKL bytes long. [RFC 7252 §3]"
  - kind: group
    id: codeByte
    name: Code (c.dd)
    children:
      - id: codeClass
        name: Class
        type:
          kind: enum
          bits: 3
          variants:
            0: Request
            2: Success Response
            3: Reserved
            4: Client Error Response
            5: Server Error Response
            6: Reserved
            7: Reserved
        category: type
        defaultValue: 0
        doc: "Upper 3 bits of Code — request/response class. 0 marks a request (with Detail 0=Empty/ping, 1=GET, 2=POST, 3=PUT, 4=DELETE). 2/4/5 mark successful / client-error / server-error responses; the full code is conventionally written `c.dd` (e.g. 2.05, 4.04). [RFC 7252 §3 / §12.1]"
      - id: codeDetail
        name: Detail
        type: { kind: int, bits: 5 }
        category: type
        defaultValue: 0
        doc: "Lower 5 bits of Code — detail within the class. Examples: Class 0 Detail 1=GET, 2=POST, 3=PUT, 4=DELETE; Class 2 Detail 5=Content (2.05), Detail 1=Created (2.01); Class 4 Detail 4=Not Found (4.04), Detail 0=Bad Request (4.00); Class 5 Detail 0=Internal Server Error (5.00). Code 0.00 (Class=0, Detail=0) is the 'Empty' message used for ping / pure ACK. [RFC 7252 §3 / §12.1]"
  - id: messageId
    name: Message ID
    type: { kind: int, bits: 16 }
    category: identifier
    doc: "16-bit big-endian message identifier chosen by the originator. Used to detect duplicates and to match an ACK (or RST) back to the CON / NON message it acknowledges. Lifetime is EXCHANGE_LIFETIME (~247 s) per RFC 7252 §4.8. [RFC 7252 §3 / §4.4]"
  - id: token
    name: Token
    type: { kind: bytes, n: { kind: ref, field: tkl } }
    category: identifier
    doc: "Request/response correlator. Exactly TKL bytes (0..8). A client picks a Token value that — together with the endpoint — uniquely identifies the request; the server echoes it verbatim in every response (including separate responses that arrive after the empty ACK). Distinct from Message ID, which only correlates a CON with its matching ACK/RST. [RFC 7252 §3 / §5.3]"
  - kind: repeat
    id: options
    name: Options
    category: variable
    doc: Chain of Option records in ascending Option Number order, encoded as deltas from the previous option's number. Each record is a 1-byte (Delta<<4 | Length) header optionally followed by 1- or 2-byte Delta and Length extensions (when the nibble is 13 or 14), then the Option Value. The chain ends at the end of the datagram or at the 0xFF Payload Marker (which is NOT an option — Delta=15 inside an option header is a format error). The repeat therefore terminates when a peek of the next byte equals 0xFF (the marker), or at end-of-stream. Common option numbers (RFC 7252 §5.10) — 1 If-Match, 3 Uri-Host, 4 ETag, 5 If-None-Match, 6 Observe (RFC 7641), 7 Uri-Port, 8 Location-Path, 11 Uri-Path, 12 Content-Format, 14 Max-Age, 15 Uri-Query, 17 Accept, 20 Location-Query, 23 Block2 / 27 Block1 (RFC 7959), 28 Size2 / 60 Size1, 35 Proxy-Uri, 39 Proxy-Scheme. [RFC 7252 §3.1 / §5.10]
    count:
      until: { kind: op, op: "==", a: { kind: peek, bits: 8 }, b: { kind: lit, value: 255 } }
    element:
      id: optionRecord
      fields:
        - kind: group
          id: optHeaderByte
          name: Option Header (Delta | Length)
          doc: "The 1-byte option header: high nibble = Option Delta, low nibble = Option Length, both interpreted with the 13/14/15 sentinel scheme below. A header byte of 0xFF (Delta=15, Length=15) is the Payload Marker and is never parsed as an option — the enclosing repeat stops on a peek of 0xFF before this iteration begins. [RFC 7252 §3.1]"
          children:
            - id: optDelta
              name: Delta
              type: { kind: int, bits: 4 }
              category: length
              doc: "Option Delta nibble. 0..12 are interpreted literally; 13 means a 1-byte extension follows (actual delta = ext + 13); 14 means a 2-byte big-endian extension follows (actual delta = ext + 269); 15 is reserved inside an option header (a message format error — the 0xFF marker is filtered out by the repeat's until-peek). The absolute Option Number is the running sum of all prior deltas (reconstruction is a codec concern, §4). [RFC 7252 §3.1]"
              values:
                - { range: [0, 12], name: literal, label: "Literal delta (no extension)", level: must }
                - { value: 13, name: ext8, label: "1-byte delta extension follows (+13)", level: must }
                - { value: 14, name: ext16, label: "2-byte delta extension follows (+269)", level: must }
                - { value: 15, name: reserved, label: "Reserved (Payload Marker / format error)", level: must }
            - id: optLength
              name: Length
              type: { kind: int, bits: 4 }
              category: length
              doc: "Option Length nibble. 0..12 are the literal Option Value byte count; 13 means a 1-byte extension follows (actual length = ext + 13); 14 means a 2-byte big-endian extension follows (actual length = ext + 269); 15 is reserved inside an option header (a message format error). [RFC 7252 §3.1]"
              values:
                - { range: [0, 12], name: literal, label: "Literal length (no extension)", level: must }
                - { value: 13, name: ext8, label: "1-byte length extension follows (+13)", level: must }
                - { value: 14, name: ext16, label: "2-byte length extension follows (+269)", level: must }
                - { value: 15, name: reserved, label: "Reserved (Payload Marker / format error)", level: must }
        - kind: switch
          id: byOptDelta
          on: { kind: ref, field: optDelta }
          doc: "Reads the Option Delta extension field, if any, selected by the already-parsed Delta nibble. Nibble 13 → 1-byte extension; 14 → 2-byte big-endian extension; all other values (0..12, and the reserved 15) consume no extension. [RFC 7252 §3.1]"
          cases:
            "13":
              id: optDeltaExt13
              doc: "Delta=13: a 1-byte unsigned extension follows."
              fields:
                - { id: optDeltaExt1, name: Delta Extended (1 B), type: { kind: int, bits: 8 }, category: length, doc: "Extended delta byte. Actual Option Delta = this value + 13 (range 13..268). [RFC 7252 §3.1]" }
            "14":
              id: optDeltaExt14
              doc: "Delta=14: a 2-byte big-endian unsigned extension follows."
              fields:
                - { id: optDeltaExt2, name: Delta Extended (2 B), type: { kind: int, bits: 16 }, category: length, doc: "Extended delta word (big-endian). Actual Option Delta = this value + 269 (range 269..65804). [RFC 7252 §3.1]" }
        - kind: switch
          id: byOptLength
          on: { kind: ref, field: optLength }
          doc: "Reads the Option Length extension field, if any, selected by the already-parsed Length nibble. Nibble 13 → 1-byte extension; 14 → 2-byte big-endian extension; all other values consume no extension. [RFC 7252 §3.1]"
          cases:
            "13":
              id: optLenExt13
              doc: "Length=13: a 1-byte unsigned extension follows."
              fields:
                - { id: optLengthExt1, name: Length Extended (1 B), type: { kind: int, bits: 8 }, category: length, doc: "Extended length byte. Actual Option Length = this value + 13 (range 13..268). [RFC 7252 §3.1]" }
            "14":
              id: optLenExt14
              doc: "Length=14: a 2-byte big-endian unsigned extension follows."
              fields:
                - { id: optLengthExt2, name: Length Extended (2 B), type: { kind: int, bits: 16 }, category: length, doc: "Extended length word (big-endian). Actual Option Length = this value + 269 (range 269..65804). [RFC 7252 §3.1]" }
        - kind: virtual
          id: optValueBytes
          name: Option Value length
          doc: "Decode-time Option Value byte count, derived from the Length nibble and its extension: nibble 13 → optLengthExt1 + 13; nibble 14 → optLengthExt2 + 269; otherwise the literal nibble value. Absent extension fields seed to 0, so the literal branch reduces to optLength. [RFC 7252 §3.1]"
          expr:
            kind: cond
            test: { kind: op, op: "==", a: { kind: ref, field: optLength }, b: { kind: lit, value: 13 } }
            t: { kind: op, op: "+", a: { kind: ref, field: optLengthExt1 }, b: { kind: lit, value: 13 } }
            f:
              kind: cond
              test: { kind: op, op: "==", a: { kind: ref, field: optLength }, b: { kind: lit, value: 14 } }
              t: { kind: op, op: "+", a: { kind: ref, field: optLengthExt2 }, b: { kind: lit, value: 269 } }
              f: { kind: ref, field: optLength }
        - id: optValue
          name: Option Value
          type: { kind: bytes, n: { kind: ref, field: optValueBytes } }
          category: variable
          doc: "Option Value, optValueBytes bytes long (0..65804). Format is option-specific — empty, uint, opaque, or UTF-8 string per RFC 7252 §3.2. [RFC 7252 §3.1]"
  - kind: optional
    when: { kind: op, op: "==", a: { kind: peek, bits: 8 }, b: { kind: lit, value: 255 } }
    container:
      kind: group
      id: payloadRegion
      name: Payload
      doc: "End of the Options chain. Present only when the next byte is the 0xFF Payload Marker; its absence denotes a zero-length payload (and no marker). A marker followed by a zero-length payload MUST be processed as a message format error. Because 0xFF can also occur inside an option length or value, the marker is found by parsing Options in order, not by byte-scanning. [RFC 7252 §3]"
      children:
        - id: payloadMarker
          name: Payload Marker
          type: { kind: int, bits: 8 }
          category: payload-marker
          const: 255
          doc: "Single byte 0xFF marking the end of the Options chain and the start of the Payload. [RFC 7252 §3]"
        - id: payload
          name: Payload
          type: { kind: bytes, n: { kind: remaining } }
          category: variable
          doc: "Message Payload, running from immediately after the 0xFF marker to the end of the UDP datagram (or DTLS record). The payload's media type and encoding are described by the Content-Format option (number 12); its semantics depend on the request method or response code. CoAP carries no payload length in the message, so the payload consumes all remaining bytes of the decoder-supplied datagram. [RFC 7252 §3 / §5.5]"
