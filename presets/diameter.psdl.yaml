# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: Diameter Base Protocol
rowBits: 32
byteOrder: BE
description: Diameter Base Protocol (RFC 6733), successor to RADIUS (RFC 2865). A fixed 20-byte header — Version (always 1), 24-bit Message Length, 8-bit Command Flags (R/P/E/T bits), 24-bit Command Code, 32-bit Application-ID, 32-bit Hop-by-Hop Identifier, and 32-bit End-to-End Identifier — followed by a sequence of Attribute-Value Pairs (AVPs). Each AVP carries a 32-bit AVP Code, 8-bit AVP Flags (V/M/P bits), 24-bit AVP Length, an optional 32-bit Vendor-ID (present when the V flag is set), and a variable-length Data field. Diameter runs over TCP (port 3868) or SCTP (port 3868) and optionally TLS/DTLS. Common applications include NASREQ (RFC 7155), EAP (RFC 4072), Credit-Control (RFC 4006), and S6a/S6d (3GPP TS 29.272).

body:
  - kind: group
    id: diameterHeader
    name: Diameter Fixed Header
    children:
      - id: diameterVersion
        name: Version
        type: { kind: int, bits: 8 }
        category: type
        defaultValue: 1
        doc: Diameter protocol version. MUST be set to 1. A message with any other Version value MUST be rejected. [RFC 6733 §3]
      - id: diameterMessageLength
        name: Message Length
        type: { kind: int, bits: 24 }
        category: length
        doc: Total length of the Diameter message in octets, including the 20-byte header and all AVPs (with any necessary padding). The value is always a multiple of 4 due to per-AVP 32-bit padding. [RFC 6733 §3]
      - kind: group
        id: commandFlagsGroup
        name: Command Flags
        children:
          - id: flagR
            name: R (Request)
            type: { kind: int, bits: 1 }
            category: flags
            doc: "Request bit. Set to 1 if this message is a request; 0 if it is an answer. [RFC 6733 §3]"
          - id: flagP
            name: P (Proxiable)
            type: { kind: int, bits: 1 }
            category: flags
            doc: "Proxiable bit. Set to 1 if the message may be proxied, relayed, or redirected; 0 if it MUST be locally processed. [RFC 6733 §3]"
          - id: flagE
            name: E (Error)
            type: { kind: int, bits: 1 }
            category: flags
            doc: "Error bit. Set to 1 in an answer message that carries a protocol error (Result-Code 3xxx). MUST NOT be set on request messages. [RFC 6733 §3]"
          - id: flagT
            name: T (Potentially re-transmitted)
            type: { kind: int, bits: 1 }
            category: flags
            doc: "Re-transmission indicator. Set to 1 on retransmitted request messages when failover is used to guard against duplicate processing at the peer. MUST NOT be set on answers. [RFC 6733 §3]"
          - id: flagsReserved
            name: r (Reserved)
            type: { kind: int, bits: 4 }
            category: reserved
            doc: "Reserved flag bits. MUST be set to 0 by the sender and MUST be ignored by the receiver. [RFC 6733 §3]"
      - id: diameterCommandCode
        name: Command Code
        type: { kind: int, bits: 24 }
        category: type
        doc: "Identifies the command associated with the message. Assigned by IANA. Examples: 257=Capabilities-Exchange (CER/CEA), 258=Re-Auth (RAR/RAA), 271=Accounting (ACR/ACA), 280=Device-Watchdog (DWR/DWA), 282=Disconnect-Peer (DPR/DPA), 300=User-Authorization (UAR/UAA, RFC 4740), 301=Server-Assignment (SAR/SAA). [RFC 6733 §3 / §11.2]"
      - id: diameterApplicationId
        name: Application-ID
        type: { kind: int, bits: 32 }
        category: identifier
        doc: "Identifies the Diameter application to which the message belongs. 0=Diameter Common Messages, 1=NASREQ (RFC 7155), 2=Mobile IPv4 (RFC 4004), 3=Base Accounting, 4=Credit-Control (RFC 4006), 5=EAP (RFC 4072), 0xFFFFFFFF=Relay. The Application-ID in the header MUST match the value in the Auth-Application-Id or Acct-Application-Id AVP when present. [RFC 6733 §3 / §11.3]"
      - id: diameterHopByHopId
        name: Hop-by-Hop Identifier
        type: { kind: int, bits: 32 }
        category: identifier
        doc: "Uniquely identifies a request and its matching answer within a single hop (connection). Generated by the request originator and echoed verbatim in the answer. Used to match answers to outstanding requests and to detect lost answers during failover. MUST be locally unique for each active request on the connection. [RFC 6733 §3]"
      - id: diameterEndToEndId
        name: End-to-End Identifier
        type: { kind: int, bits: 32 }
        category: identifier
        doc: "Unique identifier maintained end-to-end to detect duplicate messages, even across agent hops. Assigned by the originator and MUST NOT be modified by agents. Together with the Origin-Host AVP it uniquely identifies the request for its lifetime (at least 4 minutes). [RFC 6733 §3]"

  - kind: repeat
    id: diameterAvps
    name: AVPs
    category: variable
    doc: "Sequence of Attribute-Value Pairs (AVPs) carrying all application-level data. Each AVP starts with a 32-bit AVP Code, 8-bit Flags, and 24-bit AVP Length (including the AVP header itself but not any trailing pad bytes). If the V (Vendor-Specific) flag is set, a 32-bit Vendor-ID follows the Flags/Length before the Data. AVPs MUST be padded to a 32-bit boundary; pad bytes (not included in AVP Length) MUST be set to zero. Common AVP codes: 258=Auth-Application-Id, 263=Session-Id, 264=Origin-Host, 268=Result-Code, 269=Product-Name, 277=Auth-Request-Type, 296=Origin-Realm. [RFC 6733 §4]"
    element:
      id: avpRecord
      fields:
        - id: avpCode
          name: AVP Code
          type: { kind: int, bits: 32 }
          category: identifier
          doc: "Uniquely identifies the AVP. Codes 1..255 are RADIUS-compatible (RFC 2865). Codes 256 and above are Diameter-only. When the V flag is set, AVP Code is interpreted within the namespace of the Vendor-ID; otherwise it is from the IANA Diameter AVP Codes registry. [RFC 6733 §4.1 / §11.4]"
        - kind: group
          id: avpFlagsGroup
          name: AVP Flags
          children:
            - id: avpFlagV
              name: V (Vendor-Specific)
              type: { kind: int, bits: 1 }
              category: flags
              doc: "Vendor-Specific bit. When set to 1, a 32-bit Vendor-ID field is present immediately after the AVP Length field. The AVP Code is then interpreted within the vendor's namespace. [RFC 6733 §4.1]"
            - id: avpFlagM
              name: M (Mandatory)
              type: { kind: int, bits: 1 }
              category: flags
              doc: "Mandatory bit. When set to 1, the receiver MUST understand the AVP semantics; if it does not, it MUST return an error (Result-Code 5001 AVP_UNSUPPORTED or 5004 INVALID_AVP_VALUE as appropriate). [RFC 6733 §4.1]"
            - id: avpFlagP
              name: P (Protected)
              type: { kind: int, bits: 1 }
              category: flags
              doc: "Protected bit. When set to 1, end-to-end security (e.g. CMS, RFC 6733 §13) is required for this AVP. This feature is defined for future use and is not widely deployed. [RFC 6733 §4.1]"
            - id: avpFlagsReserved
              name: r (Reserved)
              type: { kind: int, bits: 5 }
              category: reserved
              doc: "Reserved AVP flag bits. MUST be set to 0 by the sender and MUST be ignored by the receiver. [RFC 6733 §4.1]"
        - id: avpLength
          name: AVP Length
          type: { kind: int, bits: 24 }
          category: length
          doc: "Length in octets of this AVP including the AVP Code, Flags, Length fields, and the optional Vendor-ID and Data, but NOT any trailing pad bytes added to reach a 32-bit boundary. Minimum value for a non-Vendor AVP with empty Data is 8; with Vendor-ID present the minimum is 12. [RFC 6733 §4.1]"
        - kind: optional
          when: { kind: ref, field: avpFlagV }
          container:
            id: avpVendorId
            name: Vendor-ID
            type: { kind: int, bits: 32 }
            category: identifier
            doc: "IANA-assigned SMI Network Management Private Enterprise Code (RFC 2578) identifying the vendor namespace for this AVP's Code. Present only when the V flag is set. Examples: 10415=3GPP, 193=Ericsson, 2011=Nokia, 12645=ETSI. [RFC 6733 §4.1 / IANA PEN registry]"
        - id: avpData
          name: AVP Data
          type: { kind: bytes, n: { kind: ref, field: diameterAvpDataLen } }
          category: variable
          doc: "The AVP value. Format depends on AVP Code: OctetString, Integer32, Integer64, Unsigned32, Unsigned64, Float32, Float64, Grouped, Enumerated, UTF8String, DiameterIdentity, DiameterURI, Address, Time, or IPFilterRule as specified per-AVP in the Diameter application RFCs. [RFC 6733 §4.2]"
    count: { kind: ref, field: diameterAvpCount }
