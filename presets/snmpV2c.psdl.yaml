            category: type
            defaultValue: 168
            doc: "Context-specific constructed tag 0xA8 (context-specific [8], constructed) for Report-PDU. Used by the SNMPv3 engine for internal error reporting and engine-ID/time discovery; structurally identical to a Response-PDU. Defined in RFC 3416 but used operationally by RFC 3412. [RFC 3416 §3 / RFC 3412 §6]"
