# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: TLS ClientHello (full)
rowBits: 32
byteOrder: BE
description: TLS 1.3 ClientHello (RFC 8446 §4.1.2) with a populated Extensions catalog (SNI / supported_versions / supported_groups / key_share / ALPN) and the server-side encrypted handshake records modeled as an Encrypted container.
body:
  - id: msgType
    name: Handshake Type
    type:
      kind: bits
      n: 8
    category: type
    defaultValue: 1
    doc: 1 = ClientHello. [RFC 8446 §4]
  - id: length
    name: Handshake Length
    type:
      kind: bits
      n: 24
    category: length
    doc: Length of the handshake message body that follows. [RFC 8446 §4]
  - id: legacyVersion
    name: legacy_version
    type:
      kind: bits
      n: 16
    category: type
    doc: Frozen at 0x0303 (TLS 1.2) for middlebox compatibility. [RFC 8446 §4.1.2]
  - id: random
    name: random
    type:
      kind: bits
      n: 256
    category: identifier
    doc: 32 cryptographically random bytes. [RFC 8446 §4.1.2]
  - id: sessionIdLen
    name: session_id length
    type:
      kind: bits
      n: 8
    category: length
    doc: Length in bytes of the legacy_session_id that follows (0-32). This preset renders session_id as a fixed 32-byte placeholder, so this length does not resize the diagram. [RFC 8446 §4.1.2]
  - id: sessionId
    name: session_id
    type:
      kind: bits
      n: 256
    category: identifier
    doc: legacy_session_id — in TLS 1.3 the client sets this to a random value for middlebox (compatibility) mode, and the server echoes it back in ServerHello; it no longer carries real session-resumption state. [RFC 8446 §4.1.2]
  - id: cipherSuitesLen
    name: cipher_suites length
    type:
      kind: bits
      n: 16
    category: length
    doc: Length in bytes of the cipher_suites list that follows. [RFC 8446 §4.1.2]
  - id: cipherSuites
    name: cipher_suites
    type:
      kind: bits
      n: 32
    category: type
    doc: List of symmetric cipher/AEAD + hash combinations the client supports, each a 2-byte code (e.g. 0x1301 = TLS_AES_128_GCM_SHA256). [RFC 8446 §4.1.2, §B.4]
  - id: compMethodsLen
    name: compression length
    type:
      kind: bits
      n: 8
    category: length
    doc: Length in bytes of legacy_compression_methods. [RFC 8446 §4.1.2]
  - id: compMethods
    name: compression_methods
    type:
      kind: bits
      n: 8
    category: reserved
    doc: legacy_compression_methods — must be a single byte set to 0 (null) in TLS 1.3; compression is no longer supported. [RFC 8446 §4.1.2]
  - id: extensionsLen
    name: extensions length
    type:
      kind: bits
      n: 16
    category: length
    defaultValue: 0
    doc: Total length in bytes of the extensions block that follows.
  - kind: repeat
    id: extensions
    name: Extensions
    category: variable
    element:
      id: extensionRecord
      fields:
        - kind: switch
          id: byKind
          on:
            kind: ref
            field: extensions_kind
          cases:
            "0":
              id: sni
              fields:
                - id: type
                  name: Type=0
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: Extension type 0 = server_name (SNI), letting the client name the host it wants so a multi-tenant server can pick the right certificate. [RFC 6066 §3]
                - id: length
                  name: Ext Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of this extension's data that follows. [RFC 8446 §4.2]
                - id: listLen
                  name: List Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of the ServerNameList. [RFC 6066 §3]
                - id: nameType
                  name: Name Type=0
                  type:
                    kind: bits
                    n: 8
                  category: type
                  doc: NameType for the entry; 0 = host_name (a DNS hostname). [RFC 6066 §3]
                - id: nameLen
                  name: Name Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of the host_name string that follows. [RFC 6066 §3]
                - id: hostname
                  name: host_name (var)
                  type:
                    kind: bits
                    n: 96
                  category: addressing
                  doc: The requested server hostname as an ASCII DNS name, without a trailing dot (e.g. "example.com"). [RFC 6066 §3]
            "10":
              id: supportedGroups
              fields:
                - id: type
                  name: Type=10
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: Extension type 10 = supported_groups, listing the (EC)DHE named groups the client can use for key exchange. [RFC 8446 §4.2.7]
                - id: length
                  name: Ext Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of this extension's data that follows. [RFC 8446 §4.2]
                - id: listLen
                  name: List Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of the named_group_list. [RFC 8446 §4.2.7]
                - id: groups
                  name: named_group_list
                  type:
                    kind: bits
                    n: 32
                  category: type
                  doc: Ordered list of NamedGroup codes (preferred first), each 2 bytes (e.g. 0x001d = x25519, 0x0017 = secp256r1). [RFC 8446 §4.2.7]
            "16":
              id: alpn
              fields:
                - id: type
                  name: Type=16
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: Extension type 16 = application_layer_protocol_negotiation (ALPN), letting the client offer L7 protocols so the server can pick one in its reply. [RFC 7301 §3.1]
                - id: length
                  name: Ext Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of this extension's data that follows. [RFC 8446 §4.2]
                - id: listLen
                  name: Proto List Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of the ProtocolNameList. [RFC 7301 §3.1]
                - id: protoLen
                  name: Proto Len
                  type:
                    kind: bits
                    n: 8
                  category: length
                  doc: Length in bytes of the protocol name that follows. [RFC 7301 §3.1]
                - id: protocol
                  name: protocol (var)
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: An offered protocol identifier (e.g. "h2" for HTTP/2, "http/1.1"); values are registered in the IANA ALPN registry. [RFC 7301 §3.1]
            "43":
              id: supportedVersions
              fields:
                - id: type
                  name: Type=43
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: Extension type 43 = supported_versions; in TLS 1.3 this is how the client actually advertises 1.3 rather than legacy_version. [RFC 8446 §4.2.1]
                - id: length
                  name: Ext Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of this extension's data that follows. [RFC 8446 §4.2]
                - id: vListLen
                  name: Versions Len
                  type:
                    kind: bits
                    n: 8
                  category: length
                  doc: Length in bytes of the versions list that follows. [RFC 8446 §4.2.1]
                - id: versions
                  name: versions
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: List of supported protocol versions in preference order, each 2 bytes (0x0304 = TLS 1.3, 0x0303 = TLS 1.2). [RFC 8446 §4.2.1]
            "51":
              id: keyShare
              fields:
                - id: type
                  name: Type=51
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: Extension type 51 = key_share, carrying the client's ephemeral (EC)DHE public key(s) so a 1-RTT handshake can complete. [RFC 8446 §4.2.8]
                - id: length
                  name: Ext Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of this extension's data that follows. [RFC 8446 §4.2]
                - id: listLen
                  name: Shares Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of the client_shares list of KeyShareEntry records. [RFC 8446 §4.2.8]
                - id: group
                  name: group
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: NamedGroup this key share is for, identifying the curve/DH group (e.g. 0x001d = x25519). [RFC 8446 §4.2.8]
                - id: keyLen
                  name: key Len
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Length in bytes of the key_exchange value that follows. [RFC 8446 §4.2.8]
                - id: key
                  name: key_exchange (X25519, 32B)
                  type:
                    kind: bits
                    n: 256
                  category: identifier
                  doc: The client's ephemeral public key for the named group; for x25519 this is the 32-byte public value. [RFC 8446 §4.2.8]
    count:
      kind: ref
      field: tlsClientHelloFull_extensions_count
  - kind: encrypted
    id: serverHandshake
    name: Server Handshake (encrypted)
    contextNote: Encrypted handshake — requires TLS 1.3 key schedule outputs (handshake traffic keys derived from ECDHE).
    wireBits:
      kind: lit
      value: 384
    category: payload-marker
    plaintext:
      id: serverHandshakePlaintext
      fields:
        - id: sh_msgType
          name: ServerHello Type=2
          type:
            kind: bits
            n: 8
          category: type
          doc: ServerHello handshake message type. [RFC 8446 §4.1.3]
        - id: sh_length
          name: Handshake Length
          type:
            kind: bits
            n: 24
          category: length
          doc: Length in bytes of the ServerHello handshake message body that follows. [RFC 8446 §4]
        - id: sh_legacyVersion
          name: legacy_version
          type:
            kind: bits
            n: 16
          category: type
          doc: Frozen at 0x0303 (TLS 1.2) for middlebox compatibility; the real version is negotiated via the supported_versions extension. [RFC 8446 §4.1.3]
        - id: sh_random
          name: random
          type:
            kind: bits
            n: 256
          category: identifier
          doc: 32 server-chosen random bytes; the last 8 bytes carry a fixed sentinel when the server downgrades to an earlier TLS version. [RFC 8446 §4.1.3]
        - id: ee_msgType
          name: EncryptedExtensions Type=8
          type:
            kind: bits
            n: 8
          category: type
          doc: EncryptedExtensions handshake message type. [RFC 8446 §4.3.1]
        - id: ee_body
          name: EncryptedExtensions Body
          type:
            kind: bits
            n: 64
          category: variable
          doc: Extensions block carrying server responses that are not needed to establish keys (e.g. server_name ack, ALPN, supported_groups); sent encrypted under handshake keys. [RFC 8446 §4.3.1]
        - id: fin_msgType
          name: Finished Type=20
          type:
            kind: bits
            n: 8
          category: type
          doc: Finished handshake message type. [RFC 8446 §4.4.4]
        - id: fin_verifyData
          name: verify_data
          type:
            kind: bits
            n: 48
          category: checksum
          doc: HMAC over the handshake transcript using a key derived from the sender's traffic secret; proves the peer holds the right keys and the handshake was not tampered with. [RFC 8446 §4.4.4]
