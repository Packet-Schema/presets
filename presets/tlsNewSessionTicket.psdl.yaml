# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: TLS NewSessionTicket
rowBits: 32
byteOrder: BE
description: TLS 1.3 NewSessionTicket handshake message (RFC 8446 §4.6.1). Sent by the server after the Finished message to deliver a session resumption ticket; enables 0-RTT data and abbreviated handshakes. Contains a Handshake header (type=4, 24-bit length) followed by ticket_lifetime, ticket_age_add, ticket_nonce, ticket, and extensions.
meta:
  family: tls
  tags: [application, tcp-based, signaling, security, authentication]
body:
  - id: tlsHandshakeType
    name: Handshake Type
    type:
      kind: enum
      bits: 8
      variants:
        4: "NewSessionTicket"
    category: type
    doc: Handshake message type — 4 = NewSessionTicket. Identifies this as a session resumption ticket message delivered by the server after authentication. [RFC 8446 §4]
  - id: tlsHandshakeLen
    name: Handshake Length
    type:
      kind: int
      bits: 24
    category: length
    doc: 24-bit big-endian length in bytes of the handshake message body that immediately follows this field (ticket_lifetime through extensions). [RFC 8446 §4]
  - id: tlsTicketLifetime
    name: ticket_lifetime
    type:
      kind: int
      bits: 32
    category: variable
    doc: Lifetime hint for the ticket in seconds, as a 32-bit unsigned integer. Servers MUST NOT use any value greater than 604800 seconds (7 days). A value of zero indicates that the ticket should be discarded immediately. [RFC 8446 §4.6.1]
    values:
      - value: 0
        name: discard_immediately
        label: "Discard immediately"
        doc: A ticket_lifetime of zero indicates the ticket should be discarded immediately and not used for resumption.
        level: must
        meta: { rfc: 8446, section: "4.6.1" }
      - range: [604801, 4294967295]
        name: over_max_lifetime
        label: "Exceeds maximum (>7 days)"
        doc: Servers MUST NOT use any ticket_lifetime greater than 604800 seconds (7 days).
        level: must
        meta: { rfc: 8446, section: "4.6.1" }
  - id: tlsTicketAgeAdd
    name: ticket_age_add
    type:
      kind: int
      bits: 32
    category: identifier
    doc: A securely generated 32-bit random value used to obscure the age of the ticket. Added to the client's view of elapsed time before it is sent in the pre_shared_key extension's obfuscated_ticket_age field. [RFC 8446 §4.6.1]
  - id: tlsTicketNonceLen
    name: ticket_nonce length
    type:
      kind: int
      bits: 8
    category: length
    doc: Length in bytes of the ticket_nonce value that follows. The nonce is unique across all tickets issued on the same connection and is used to derive the per-ticket PSK. [RFC 8446 §4.6.1]
  - id: tlsTicketNonce
    name: ticket_nonce
    type:
      kind: bytes
      n:
        kind: ref
        field: tlsTicketNonceLen
    category: identifier
    doc: Unique per-ticket nonce value; length given by the preceding ticket_nonce length byte. Combined with the resumption_master_secret via HKDF-Expand-Label to derive the PSK associated with this ticket. [RFC 8446 §4.6.1]
  - id: tlsTicketLen
    name: ticket length
    type:
      kind: int
      bits: 16
    category: length
    doc: 16-bit big-endian length in bytes of the opaque ticket value that follows. The ticket structure is server-defined (e.g. an encrypted session state) and opaque to the client. [RFC 8446 §4.6.1]
  - id: tlsTicket
    name: ticket
    type:
      kind: bytes
      n:
        kind: ref
        field: tlsTicketLen
    category: variable
    doc: Opaque session resumption ticket whose internal format is determined by the server. Presented by the client in a subsequent ClientHello pre_shared_key extension to resume the session or send 0-RTT early data. [RFC 8446 §4.6.1]
  - id: tlsTicketExtBytes
    name: extensions length
    type:
      kind: int
      bits: 16
    category: length
    doc: 16-bit big-endian total length in bytes of the extensions block that follows. NewSessionTicket extensions include early_data (max_early_data_size) if 0-RTT is offered. [RFC 8446 §4.6.1]
  - id: tlsTicketExtensions
    name: extensions
    type:
      kind: bytes
      n:
        kind: ref
        field: tlsTicketExtBytes
    category: variable
    doc: TLV-encoded extension list for the NewSessionTicket message. The only extension currently defined for this message is early_data (type 42), which carries the max_early_data_size (4 B) the server is willing to accept. [RFC 8446 §4.6.1, §4.2.10]
