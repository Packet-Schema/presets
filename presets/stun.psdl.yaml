# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: STUN Message
rowBits: 32
byteOrder: BE
description: STUN (Session Traversal Utilities for NAT) message format as defined in RFC 8489. Fixed 20-byte header followed by variable-length TLV attributes.
meta:
  family: stun-turn
  tags: [application, udp-based, signaling, discovery]
body:
  - kind: group
    id: stunMessageType
    name: Message Type
    children:
      - { id: stunZeros, name: "Zeros", type: { kind: int, bits: 2 }, category: reserved, doc: "Must be 0b00; top two bits of STUN message type are always zero." }
      - { id: stunMethodHigh, name: "Method (M11..M7)", type: { kind: int, bits: 5 }, category: type, doc: "Most-significant 5 method bits M11..M7. The 12-bit method is split because class bits are interleaved among the method bits per RFC 8489 Section 5 (layout: 0 0 M11 M10 M9 M8 M7 C1 M6 M5 M4 C0 M3 M2 M1 M0)." }
      - { id: stunClassHigh, name: "Class C1", type: { kind: int, bits: 1 }, category: type, doc: "Class bit C1 at message-type bit position 8 (LSB-0 numbering of the 16-bit type word). Together with C0, encodes the class: 00=Request, 01=Indication, 10=Success Response, 11=Error Response." }
      - { id: stunMethodMid, name: "Method (M6..M4)", type: { kind: int, bits: 3 }, category: type, doc: "Middle method bits M6..M4." }
      - { id: stunClassLow, name: "Class C0", type: { kind: int, bits: 1 }, category: type, doc: "Class bit C0 at message-type bit position 4 (LSB-0 numbering of the 16-bit type word). Together with C1, encodes the class: 00=Request, 01=Indication, 10=Success Response, 11=Error Response." }
      - { id: stunMethodLow, name: "Method (M3..M0)", type: { kind: int, bits: 4 }, category: type, doc: "Least-significant method bits M3..M0. For example, method 0x001 = Binding." }
  - { id: stunMessageLength, name: "Message Length", type: { kind: int, bits: 16 }, category: length, doc: "Size of the message in bytes, not including the 20-byte header. Must be a multiple of 4." }
  - { id: stunMagicCookie, name: "Magic Cookie", type: { kind: int, bits: 32 }, category: identifier, doc: "Fixed value 0x2112A442. Used to distinguish STUN from older protocols and aids in NAT traversal." }
  - { id: stunTransactionId, name: "Transaction ID", type: { kind: bits, n: 96 }, category: identifier, doc: "Randomly chosen 96-bit (12-byte) identifier used to correlate requests and responses." }
  - kind: bounded
    id: stunAttributesScope
    name: Attributes
    bytes: { kind: ref, field: "stunMessageLength" }
    doc: "Byte-bounded region holding the STUN attributes. Its size equals the Message Length, which counts all bytes after the 20-byte header. There is no attribute-count field; attributes are parsed as TLVs until this region is exhausted. [RFC 8489 Section 5]"
    fields:
      - kind: repeat
        id: stunAttributes
        count: eos
        element:
          id: stunAttribute
          fields:
            - { id: stunAttrType, name: "Attribute Type", type: { kind: int, bits: 16 }, category: type, doc: "Attribute type: 0x0001=MAPPED-ADDRESS, 0x0006=USERNAME, 0x0008=MESSAGE-INTEGRITY, 0x0009=ERROR-CODE, 0x000A=UNKNOWN-ATTRIBUTES, 0x0014=REALM, 0x0015=NONCE, 0x0020=XOR-MAPPED-ADDRESS, 0x8022=SOFTWARE, 0x8028=FINGERPRINT." }
            - { id: stunAttrLen, name: "Attribute Length", type: { kind: int, bits: 16 }, category: length, doc: "Length of the attribute value in bytes before padding. The value is padded to a 4-byte boundary." }
            - { id: stunAttrValue, name: "Attribute Value", type: { kind: bytes, n: { kind: ref, field: "stunAttrLen" } }, category: variable, doc: "Attribute value of stunAttrLen bytes. The value is padded with up to 3 bytes so the next attribute begins on a 4-byte boundary; the padding is consumed by the following align (and is not counted in stunAttrLen)." }
            - { kind: align, to: 32, doc: "Consume 0-3 padding bytes so each attribute is a multiple of 4 bytes. STUN attributes start at byte 20 (a 4-byte boundary relative to the document origin), so aligning to 32 bits pads each attribute value to the next 4-byte boundary. [RFC 8489 Section 14]" }
