# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: Portmap / RPCBIND Mapping Entry
rowBits: 32
byteOrder: BE
description: "ONC RPC Portmapper (RFC 1833) mapping structure used in PMAPPROC_GETPORT requests and responses. The portmapper runs on well-known UDP/TCP port 111 and maps (program, version, protocol) tuples to the port number on which that RPC program is currently listening. Each mapping record is four 32-bit fields: Program number, Version, Protocol (IPPROTO_TCP=6 or IPPROTO_UDP=17), and the assigned Port. Total fixed length: 128 bits (16 bytes)."

body:
  - id: program
    name: Program
    type: { kind: int, bits: 32 }
    category: identifier
    doc: "ONC RPC program number. Globally unique identifier for an RPC service. Well-known assignments include 100000 (portmapper itself), 100003 (NFS), 100005 (mountd), 100021 (NLM), 100024 (status). The portmapper resolves this number to a port on the local host. [RFC 1833 §3.2, RFC 5531 §19.3]"

  - id: version
    name: Version
    type: { kind: int, bits: 32 }
    category: identifier
    doc: "RPC program version number. A single program number may host multiple versions simultaneously; each version may differ in procedure signatures or semantics. PMAPPROC_GETPORT queries a specific (program, version) pair. [RFC 1833 §3.2, RFC 5531 §8.2]"

  - id: protocol
    name: Protocol
    type:
      kind: enum
      bits: 32
      variants:
        6: "TCP"
        17: "UDP"
    category: type
    doc: "IP transport protocol over which the RPC program is reachable. 6=IPPROTO_TCP, 17=IPPROTO_UDP. The portmapper maintains separate entries for TCP and UDP listeners of the same (program, version) pair. Other values are possible but uncommon. [RFC 1833 §3.2, RFC 5531]"

  - id: port
    name: Port
    type: { kind: int, bits: 32 }
    category: addressing
    doc: "TCP or UDP port number on the local host where the specified RPC program/version/protocol is currently listening. Zero in a PMAPPROC_GETPORT response indicates that the program is not registered for the requested (program, version, protocol) combination. [RFC 1833 §3.2]"
