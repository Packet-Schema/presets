# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: SSH Binary Packet Protocol
rowBits: 32
byteOrder: BE
description: SSH Binary Packet Protocol (RFC 4253 §6). Each packet consists of a length-prefixed payload with random padding and an optional MAC.
body:
  - { id: packetLength, name: Packet Length, type: { kind: int, bits: 32 }, category: length, doc: "Length of the packet in bytes, not including the MAC or the packet_length field itself (i.e. padding_length + payload + random_padding)." }
  - { id: paddingLength, name: Padding Length, type: { kind: int, bits: 8 }, category: length, doc: "Length of the random padding in bytes. Must be between 4 and 255 inclusive, chosen so that the total packet length is a multiple of the cipher block size or 8." }
  - { id: payload, name: Payload, type: { kind: bytes, n: { kind: op, op: "-", a: { kind: op, op: "-", a: { kind: ref, field: packetLength }, b: { kind: ref, field: paddingLength } }, b: { kind: lit, value: 1 } } }, category: payload-marker, doc: "The actual payload data of the SSH packet. Its length in bytes = packet_length − padding_length − 1, since packet_length counts padding_length (1 byte) + payload + random padding." }
  - { id: randomPadding, name: Random Padding, type: { kind: bytes, n: { kind: ref, field: "paddingLength" } }, category: reserved, doc: "Arbitrary-length padding such that payload + padding is a multiple of the cipher block size (minimum 8). The padding bytes should be random." }
  - { id: mac, name: MAC, type: { kind: bytes, n: { kind: remaining } }, category: checksum, doc: "Message Authentication Code computed over the packet. The MAC algorithm and thus its byte length are negotiated out-of-band during key exchange (not carried on the wire), so the MAC occupies all bytes remaining after the binary packet; 0 bytes if the negotiated MAC algorithm is none." }
