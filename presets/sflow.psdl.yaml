# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: sFlow v5
rowBits: 32
byteOrder: BE
description: "sFlow version 5 datagram (sFlow.org specification). sFlow is an industry-standard traffic monitoring technology that provides visibility into network activity by embedding agents in network devices. Each UDP datagram carries a fixed 28-byte header — Version (must be 5), Agent Address Type, Agent Address, Sub-Agent ID, Sequence Number, System Uptime, Number of Samples — followed by a variable-length array of sample records. Two sample types are defined: Flow Sample (type 1), which carries truncated packet headers and metadata for statistical traffic analysis, and Counter Sample (type 2), which carries interface statistics. Each sample record is encoded as a Type-Length-Value structure. sFlow agents export datagrams to a central sFlow collector (typically UDP port 6343). The protocol is designed for line-rate sampling on high-speed links; the sampling rate is communicated out-of-band via SNMP or a management interface."

body:
  - id: sflowVersion
    name: Version
    type: { kind: int, bits: 32 }
    category: type
    doc: "sFlow datagram version number. MUST be 5 for this specification. A collector that receives a datagram with a version other than 5 SHOULD discard it. Earlier versions (1, 2, 4) are obsolete. [sFlow v5 spec §2]"

  - id: sflowAgentAddrType
    name: Agent Address Type
    type:
      kind: enum
      bits: 32
      variants:
        1: "IPv4"
        2: "IPv6"
    category: type
    doc: "Address family of the Agent Address field that immediately follows. 1=IPv4 (4 bytes), 2=IPv6 (16 bytes). Determines how the collector interprets the Agent Address. This field uses the IANA address-family numbering. [sFlow v5 spec §2]"

  - id: sflowAgentAddress
    name: Agent Address
    type: { kind: bits, n: 32 }
    category: addressing
    doc: "IP address of the sFlow agent that generated this datagram, encoded according to Agent Address Type. When Agent Address Type is 1 (IPv4) this field is 32 bits; when IPv6 (type 2) the agent address would be 128 bits, but this preset models the common IPv4 case with a fixed 32-bit field. Collectors use this address to identify the originating device. [sFlow v5 spec §2]"

  - id: sflowSubAgentId
    name: Sub-Agent ID
    type: { kind: int, bits: 32 }
    category: identifier
    doc: "Identifies an sFlow sub-agent within the device. Allows a single physical device to run multiple independent sFlow agents — for example, one per line card. The combination (Agent Address, Sub-Agent ID) uniquely identifies a sample stream. Value 0 is used when there is only one sub-agent. [sFlow v5 spec §2]"

  - id: sflowSequenceNumber
    name: Sequence Number
    type: { kind: int, bits: 32 }
    category: identifier
    doc: "Monotonically increasing sequence number incremented by 1 for each datagram generated by a given sub-agent. Collectors use sequence numbers to detect dropped datagrams (gaps in the sequence) and duplicate delivery (repeated numbers). Wraps to 0 after 2^32-1. [sFlow v5 spec §2]"

  - id: sflowSysUptime
    name: System Uptime
    type: { kind: int, bits: 32 }
    category: variable
    doc: "Time, in milliseconds, since the last restart of the sFlow agent's managed device (e.g. the switch or router). Encoded as a 32-bit unsigned integer; wraps approximately every 49.7 days. Collectors use this value to detect device reboots between successive datagrams. [sFlow v5 spec §2]"

  - id: sflowSampleCount
    name: Number of Samples
    type: { kind: int, bits: 32 }
    category: length
    doc: "Count of sample records contained in this datagram. Each sample record follows immediately after this header. A value of 0 is valid (keepalive or header-only datagram). The maximum practical count is limited by the UDP payload MTU (~1400 bytes). [sFlow v5 spec §2]"

  - kind: repeat
    id: sflowSamples
    name: Sample Records
    category: variable
    element:
      id: sflowSample
      fields:
        - id: sflowSampleType
          name: Sample Type
          type:
            kind: enum
            bits: 32
            variants:
              1: "Flow Sample"
              2: "Counter Sample"
              3: "Expanded Flow Sample"
              4: "Expanded Counter Sample"
          category: type
          doc: "Identifies the format of this sample record. 1=Flow Sample — carries sampled packet data (truncated header, input/output interface, sampling rate, packet length). 2=Counter Sample — carries periodic interface or RMON counter statistics. 3=Expanded Flow Sample and 4=Expanded Counter Sample extend their base types to support 32-bit interface indices. Values are enterprise-format encoded; the enterprise (top 20 bits) is 0 for standard sFlow types. [sFlow v5 spec §3 / §4 / §5]"
        - id: sflowSampleLen
          name: Sample Length
          type: { kind: int, bits: 32 }
          category: length
          doc: "Length of the sample record data in bytes, not including the Sample Type and Sample Length fields themselves. A receiver uses this value to skip over unrecognised sample types. The actual sample body immediately follows this field and is exactly Sample Length bytes long. [sFlow v5 spec §3]"
        - id: sflowSampleData
          name: Sample Data
          type: { kind: bytes, n: { kind: ref, field: sflowSampleLen } }
          category: payload-marker
          doc: "Opaque sample record payload, exactly sflowSampleLen bytes. When Sample Type is 1 (Flow Sample), the payload encodes: 32-bit Sequence Number, 32-bit Source ID, 32-bit Sampling Rate, 32-bit Sample Pool, 32-bit Drops, 32-bit Input Interface, 32-bit Output Interface, 32-bit Flow Record count, followed by Flow Record TLVs (each with Enterprise/Format, Length, and Data). When Sample Type is 2 (Counter Sample), the payload encodes: 32-bit Sequence Number, 32-bit Source ID, 32-bit Counter Record count, followed by Counter Record TLVs. [sFlow v5 spec §3 / §4 / §5]"
    count: { kind: ref, field: sflowSampleCount }
