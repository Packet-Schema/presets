# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: TLS ClientHello
rowBits: 32
byteOrder: BE
description: TLS 1.3 ClientHello handshake message (RFC 8446 §4.1.2). Wraps inside a TLS Record (Content Type=22). Extensions are a TLV list — add SNI, supported_versions, supported_groups, key_share, ALPN as needed. All length prefixes are big-endian; vectors are length-prefixed per the TLS presentation language (RFC 8446 §3.4).
meta:
  rfc: { defined: 8446 }
  section: "4.1.2"
  aliases: [clientHello]
  family: tls
  tags: [application, tcp-based, security, authentication, key-exchange]
body:
  - id: msgType
    name: Handshake Type
    type:
      kind: bits
      n: 8
    category: type
    doc: Handshake message type — 1 = ClientHello, 2 = ServerHello, etc. [RFC 8446 §4]
  - id: length
    name: Handshake Length
    type:
      kind: bits
      n: 24
    category: length
    doc: Length of the handshake message body that follows (legacy_version through extensions). [RFC 8446 §4]
  - id: legacyVersion
    name: legacy_version
    type:
      kind: bits
      n: 16
    category: type
    doc: Frozen at 0x0303 (TLS 1.2) for middlebox compatibility — the actual negotiated version is conveyed via the supported_versions extension. [RFC 8446 §4.1.2]
  - id: random
    name: random
    type:
      kind: bits
      n: 256
    category: identifier
    doc: 32 cryptographically random bytes contributed by the client; mixed into key derivation. [RFC 8446 §4.1.2]
  - id: sessionIdLen
    name: session_id length
    type:
      kind: bits
      n: 8
    category: length
    doc: Length of the legacy session_id (0 in pure TLS 1.3, but commonly 32 for middlebox compatibility). [RFC 8446 §4.1.2]
  - id: sessionId
    name: session_id
    type: { kind: bytes, n: { kind: ref, field: sessionIdLen } }
    category: identifier
    doc: Legacy session identifier echoed by the server in its ServerHello — enables middleboxes that expected TLS 1.2 to behave normally. Its length is given by the preceding session_id length field (commonly 0 or 32). [RFC 8446 §4.1.2]
  - id: cipherSuitesLen
    name: cipher_suites length
    type:
      kind: bits
      n: 16
    category: length
    doc: Length in bytes of the cipher_suites vector that follows. [RFC 8446 §4.1.2]
  - id: cipherSuites
    name: cipher_suites
    type: { kind: bytes, n: { kind: ref, field: cipherSuitesLen } }
    category: type
    doc: Ordered list of 16-bit cipher suite identifiers the client supports — e.g. 0x1301 = TLS_AES_128_GCM_SHA256. Its byte length is given by the preceding cipher_suites length field. [RFC 8446 §4.1.2]
  - id: compMethodsLen
    name: compression length
    type:
      kind: bits
      n: 8
    category: length
    doc: Length of the legacy compression_methods vector. Must be 1 in TLS 1.3 (compression is forbidden). [RFC 8446 §4.1.2]
  - id: compMethods
    name: compression_methods
    type: { kind: bytes, n: { kind: ref, field: compMethodsLen } }
    category: reserved
    doc: Legacy compression methods — must be the single byte 0x00 (null) in TLS 1.3. Its byte length is given by the preceding compression length field. [RFC 8446 §4.1.2]
  - id: extensionsLen
    name: extensions length
    type:
      kind: bits
      n: 16
    category: length
    doc: Total length in bytes of the extensions block that follows.
    defaultValue: 0
  - kind: bounded
    id: extensionsScope
    name: Extensions
    bytes: { kind: ref, field: extensionsLen }
    doc: Byte-bounded region holding the extensions TLV list. Its size in bytes equals the preceding extensions length field; as many extensions as fit are parsed within it. [RFC 8446 §4.2]
    fields:
      - kind: repeat
        id: extensions
        count: eos
        doc: Sequence of TLS extensions (Type, Length, Value). Each extension carries its own internal layout; the list runs to the end of the extensions region. [RFC 8446 §4.2]
        element:
          id: extensions_record
          fields:
            - id: extType
              name: Extension Type
              type:
                kind: bits
                n: 16
              category: type
              doc: Extension type identifier (IANA TLS ExtensionType registry) — e.g. 0 = server_name, 10 = supported_groups, 16 = ALPN, 43 = supported_versions, 51 = key_share. [RFC 8446 §4.2]
            - id: extLen
              name: Extension Length
              type:
                kind: bits
                n: 16
              category: length
              doc: Length in bytes of this extension's data (everything after this field for this extension). [RFC 8446 §4.2]
            - kind: bounded
              id: extData
              name: Extension Data
              bytes: { kind: ref, field: extLen }
              doc: Byte-bounded extension body whose size equals the preceding Extension Length. Its internal layout is selected by the Extension Type. [RFC 8446 §4.2]
              fields:
                - kind: switch
                  id: extensions_byKind
                  on:
                    kind: ref
                    field: extType
                  cases:
                    "0":
                      id: extensions_kind_0
                      doc: server_name (SNI)
                      fields:
                        - id: listLen
                          name: List Len
                          type:
                            kind: bits
                            n: 16
                          category: length
                          doc: Length in bytes of the ServerNameList vector. [RFC 6066 §3]
                        - id: nameType
                          name: Name Type=0
                          type:
                            kind: bits
                            n: 8
                          category: type
                          doc: Type of name that follows — 0 = host_name, currently the only defined value. [RFC 6066 §3]
                        - id: nameLen
                          name: Name Len
                          type:
                            kind: bits
                            n: 16
                          category: length
                          doc: Length in bytes of the host_name string that follows. [RFC 6066 §3]
                        - id: hostname
                          name: host_name
                          type: { kind: bytes, n: { kind: ref, field: nameLen } }
                          display: ascii
                          category: variable
                          doc: The fully-qualified DNS host name being requested, as a byte string (no trailing dot). Its length is given by the preceding Name Len field. [RFC 6066 §3]
                    "10":
                      id: extensions_kind_10
                      doc: supported_groups
                      fields:
                        - id: listLen
                          name: List Len
                          type:
                            kind: bits
                            n: 16
                          category: length
                          doc: Length in bytes of the named_group_list vector that follows. [RFC 8446 §4.2.7]
                        - id: groups
                          name: named_group_list
                          type: { kind: bytes, n: { kind: ref, field: listLen } }
                          category: type
                          doc: Ordered list of 16-bit NamedGroup codes the client supports — e.g. 0x001D = x25519, 0x0017 = secp256r1. Its byte length is given by the preceding List Len field. [RFC 8446 §4.2.7]
                    "16":
                      id: extensions_kind_16
                      doc: ALPN
                      fields:
                        - id: listLen
                          name: Proto List Len
                          type:
                            kind: bits
                            n: 16
                          category: length
                          doc: Length in bytes of the ProtocolNameList vector that follows. [RFC 7301 §3.1]
                        - id: protoLen
                          name: Proto Len
                          type:
                            kind: bits
                            n: 8
                          category: length
                          doc: Length in bytes of the (first) protocol name string that follows. [RFC 7301 §3.1]
                        - id: protocol
                          name: protocol
                          type: { kind: bytes, n: { kind: ref, field: protoLen } }
                          display: ascii
                          category: variable
                          doc: An IANA-registered protocol identifier as a byte string — e.g. "h2" for HTTP/2 or "http/1.1". Its length is given by the preceding Proto Len field. [RFC 7301 §3.1]
                    "43":
                      id: extensions_kind_43
                      doc: supported_versions
                      fields:
                        - id: vListLen
                          name: Versions Len
                          type:
                            kind: bits
                            n: 8
                          category: length
                          doc: Length in bytes of the list of supported versions that follows. [RFC 8446 §4.2.1]
                        - id: versions
                          name: versions
                          type: { kind: bytes, n: { kind: ref, field: vListLen } }
                          category: type
                          doc: List of 16-bit version codes in client-preference order — 0x0304 = TLS 1.3, 0x0303 = TLS 1.2. Its byte length is given by the preceding Versions Len field. [RFC 8446 §4.2.1]
                    "51":
                      id: extensions_kind_51
                      doc: key_share
                      fields:
                        - id: listLen
                          name: Shares Len
                          type:
                            kind: bits
                            n: 16
                          category: length
                          doc: Length in bytes of the client_shares vector — the list of KeyShareEntry records that follows. [RFC 8446 §4.2.8]
                        - id: group
                          name: group
                          type:
                            kind: bits
                            n: 16
                          category: type
                          doc: NamedGroup code identifying which group this key share is for — e.g. 0x001D = x25519. [RFC 8446 §4.2.8]
                        - id: keyLen
                          name: key Len
                          type:
                            kind: bits
                            n: 16
                          category: length
                          doc: Length in bytes of the key_exchange value that follows. [RFC 8446 §4.2.8]
                        - id: key
                          name: key_exchange
                          type: { kind: bytes, n: { kind: ref, field: keyLen } }
                          category: variable
                          doc: The client's ephemeral public key for the named group — for x25519 this is the 32-byte raw public value. Its length is given by the preceding key Len field. [RFC 8446 §4.2.8]
                    "_":
                      id: extensions_kind_other
                      doc: Unrecognised / opaque extension
                      fields:
                        - id: extOpaque
                          name: extension_data
                          type: { kind: bytes, n: { kind: remaining } }
                          category: variable
                          doc: Opaque extension body for an extension type not modelled above. Consumes all remaining bytes of this extension's bounded data region. [RFC 8446 §4.2]
