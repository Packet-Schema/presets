# yaml-language-server: $schema=../../schemas/psdl.schema.json
name: TLS ClientHello
rowBits: 32
byteOrder: Network byte order (big-endian, MSB-first). All length prefixes are big-endian; vectors are length-prefixed per the TLS presentation language (RFC 8446 §3.4).
description: TLS 1.3 ClientHello handshake message (RFC 8446 §4.1.2). Wraps inside a TLS Record (Content Type=22). Extensions are a TLV list — add SNI, supported_versions, supported_groups, key_share, ALPN as needed.
body:
  - id: msgType
    name: Handshake Type
    type:
      kind: bits
      n: 8
    category: type
    doc: Handshake message type — 1 = ClientHello, 2 = ServerHello, etc. [RFC 8446 §4]
  - id: length
    name: Handshake Length
    type:
      kind: bits
      n: 24
    category: length
    doc: Length of the handshake message body that follows (legacy_version through extensions). [RFC 8446 §4]
  - id: legacyVersion
    name: legacy_version
    type:
      kind: bits
      n: 16
    category: type
    doc: Frozen at 0x0303 (TLS 1.2) for middlebox compatibility — the actual negotiated version is conveyed via the supported_versions extension. [RFC 8446 §4.1.2]
  - id: random
    name: random
    type:
      kind: bits
      n: 256
    category: identifier
    doc: 32 cryptographically random bytes contributed by the client; mixed into key derivation. [RFC 8446 §4.1.2]
  - id: sessionIdLen
    name: session_id length
    type:
      kind: bits
      n: 8
    category: length
    doc: Length of the legacy session_id (0 in pure TLS 1.3, but commonly 32 for middlebox compatibility). [RFC 8446 §4.1.2]
  - id: sessionId
    name: session_id
    type:
      kind: bits
      n: 256
    category: identifier
    doc: Legacy session identifier echoed by the server in its ServerHello — enables middleboxes that expected TLS 1.2 to behave normally. [RFC 8446 §4.1.2]
  - id: cipherSuitesLen
    name: cipher_suites length
    type:
      kind: bits
      n: 16
    category: length
    doc: Length in bytes of the cipher_suites vector that follows. [RFC 8446 §4.1.2]
  - id: cipherSuites
    name: cipher_suites
    type:
      kind: bits
      n: 32
    category: type
    doc: Ordered list of 16-bit cipher suite identifiers the client supports — e.g. 0x1301 = TLS_AES_128_GCM_SHA256. [RFC 8446 §4.1.2]
  - id: compMethodsLen
    name: compression length
    type:
      kind: bits
      n: 8
    category: length
    doc: Length of the legacy compression_methods vector. Must be 1 in TLS 1.3 (compression is forbidden). [RFC 8446 §4.1.2]
  - id: compMethods
    name: compression_methods
    type:
      kind: bits
      n: 8
    category: reserved
    doc: Legacy compression methods — must be the single byte 0x00 (null) in TLS 1.3. [RFC 8446 §4.1.2]
  - id: extensionsLen
    name: extensions length
    type:
      kind: bits
      n: 16
    category: length
    doc: Total length in bytes of the extensions block that follows.
    defaultValue: 0
  - kind: repeat
    id: extensions
    name: Extensions
    category: variable
    doc: Sequence of TLS extensions (Type, Length, Value). Each extension carries its own internal layout. [RFC 8446 §4.2]
    element:
      id: extensions_record
      fields:
        - kind: switch
          id: extensions_byKind
          on:
            kind: ref
            field: extensions_kind
          cases:
            "0":
              id: extensions_kind_0
              name: server_name (SNI)
              fields:
                - id: type
                  name: Type=0
                  type:
                    kind: bits
                    n: 16
                  doc: Extension type identifier — 0 = server_name (SNI), letting the client tell the server which virtual host it wants. [RFC 6066 §3]
                - id: length
                  name: Ext Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of this extension's data (the ServerNameList that follows). [RFC 6066 §3]
                - id: listLen
                  name: List Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of the ServerNameList vector. [RFC 6066 §3]
                - id: nameType
                  name: Name Type=0
                  type:
                    kind: bits
                    n: 8
                  doc: Type of name that follows — 0 = host_name, currently the only defined value. [RFC 6066 §3]
                - id: nameLen
                  name: Name Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of the host_name string that follows. [RFC 6066 §3]
                - id: hostname
                  name: host_name (var)
                  type:
                    kind: bits
                    n: 96
                  doc: The fully-qualified DNS host name being requested, as a byte string (no trailing dot); its length is given by the preceding Name Len field. The real SNI host_name is variable-length, but this preset draws it as a fixed-size placeholder. [RFC 6066 §3]
            "10":
              id: extensions_kind_10
              name: supported_groups
              fields:
                - id: type
                  name: Type=10
                  type:
                    kind: bits
                    n: 16
                  doc: Extension type identifier — 10 = supported_groups, listing the (EC)DHE named groups the client can use for key exchange. [RFC 8446 §4.2.7]
                - id: length
                  name: Ext Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of this extension's data (the named_group_list vector and its length prefix). [RFC 8446 §4.2.7]
                - id: listLen
                  name: List Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of the named_group_list vector that follows. [RFC 8446 §4.2.7]
                - id: groups
                  name: named_group_list
                  type:
                    kind: bits
                    n: 32
                  doc: Ordered list of 16-bit NamedGroup codes the client supports — e.g. 0x001D = x25519, 0x0017 = secp256r1. [RFC 8446 §4.2.7]
            "16":
              id: extensions_kind_16
              name: ALPN
              fields:
                - id: type
                  name: Type=16
                  type:
                    kind: bits
                    n: 16
                  doc: Extension type identifier — 16 = application_layer_protocol_negotiation (ALPN), used to negotiate the app protocol (e.g. HTTP/2) within the TLS handshake. [RFC 7301 §3.1]
                - id: length
                  name: Ext Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of this extension's data (the ProtocolNameList and its length prefix). [RFC 7301 §3.1]
                - id: listLen
                  name: Proto List Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of the ProtocolNameList vector that follows. [RFC 7301 §3.1]
                - id: protoLen
                  name: Proto Len
                  type:
                    kind: bits
                    n: 8
                  doc: Length in bytes of the protocol name string that follows. [RFC 7301 §3.1]
                - id: protocol
                  name: protocol (var)
                  type:
                    kind: bits
                    n: 16
                  doc: An IANA-registered protocol identifier as a byte string — e.g. "h2" for HTTP/2 or "http/1.1". [RFC 7301 §3.1]
            "43":
              id: extensions_kind_43
              name: supported_versions
              fields:
                - id: type
                  name: Type=43
                  type:
                    kind: bits
                    n: 16
                  doc: Extension type identifier — 43 = supported_versions, the authoritative way a TLS 1.3 client advertises protocol versions (overriding legacy_version). [RFC 8446 §4.2.1]
                - id: length
                  name: Ext Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of this extension's data (the versions vector and its length prefix). [RFC 8446 §4.2.1]
                - id: vListLen
                  name: Versions Len
                  type:
                    kind: bits
                    n: 8
                  doc: Length in bytes of the list of supported versions that follows. [RFC 8446 §4.2.1]
                - id: versions
                  name: versions
                  type:
                    kind: bits
                    n: 16
                  doc: List of 16-bit version codes in client-preference order — 0x0304 = TLS 1.3, 0x0303 = TLS 1.2. [RFC 8446 §4.2.1]
            "51":
              id: extensions_kind_51
              name: key_share
              fields:
                - id: type
                  name: Type=51
                  type:
                    kind: bits
                    n: 16
                  doc: Extension type identifier — 51 = key_share, carrying the client's ephemeral (EC)DHE public keys so a 1-RTT handshake can complete. [RFC 8446 §4.2.8]
                - id: length
                  name: Ext Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of this extension's data (the client_shares vector and its length prefix). [RFC 8446 §4.2.8]
                - id: listLen
                  name: Shares Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of the client_shares vector — the list of KeyShareEntry records that follows. [RFC 8446 §4.2.8]
                - id: group
                  name: group
                  type:
                    kind: bits
                    n: 16
                  doc: NamedGroup code identifying which group this key share is for — e.g. 0x001D = x25519. [RFC 8446 §4.2.8]
                - id: keyLen
                  name: key Len
                  type:
                    kind: bits
                    n: 16
                  doc: Length in bytes of the key_exchange value that follows. [RFC 8446 §4.2.8]
                - id: key
                  name: key_exchange (var)
                  type:
                    kind: bits
                    n: 256
                  doc: The client's ephemeral public key for the named group — for x25519 this is the 32-byte raw public value. [RFC 8446 §4.2.8]
    count:
      kind: ref
      field: extensions_count
