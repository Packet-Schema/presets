# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: TWAMP-Test (Sender)
rowBits: 32
byteOrder: BE
description: "Two-Way Active Measurement Protocol (TWAMP) Test packet — Sender format, unauthenticated mode (RFC 5357). TWAMP provides two-way IP performance measurements (delay, jitter, packet loss) by combining a control session (TWAMP-Control, TCP port 862) with one-way test streams (TWAMP-Test, UDP). In unauthenticated mode the Sender packet contains a 32-bit Sequence Number, a 64-bit NTP Timestamp, a 16-bit Error Estimate, and zero or more trailing padding bytes that pad the packet up to the Padding Length negotiated during TWAMP-Control setup; the padding therefore runs to the end of the UDP datagram and is consumed as the remaining bytes of the packet. The Reflector echoes this data together with additional timestamp and TTL fields (not shown here)."
meta:
  rfc: { defined: 5357 }
  section: "4.1.2"
  aliases: [twamp, twamp-test]
  family: owamp-twamp
  tags: [application, udp-based, measurement, telemetry]

body:
  - id: twampSeqNumber
    name: Sequence Number
    type: { kind: int, bits: 32 }
    category: identifier
    doc: "Per-stream sequence number, starting at 0 and incremented by 1 for each transmitted Test packet. Used by the receiver to detect loss and reordering, and to correlate reflected packets with originals. [RFC 5357 §4.1.2]"

  - kind: group
    id: twampTimestampGroup
    name: Timestamp
    children:
      - id: twampTimestampSec
        name: Timestamp (Seconds)
        type: { kind: int, bits: 32 }
        category: variable
        doc: "Integer part of the NTP timestamp (seconds since 1 January 1900 UTC) recording when the Sender transmitted this packet. Combined with Timestamp Fraction, forms a 64-bit NTP timestamp as specified by RFC 5905. [RFC 5357 §4.1.2]"
      - id: twampTimestampFrac
        name: Timestamp (Fraction)
        type: { kind: int, bits: 32 }
        category: variable
        doc: "Fractional part of the NTP timestamp, in units of 2^-32 seconds (~233 ps resolution). Combined with Timestamp Seconds, forms a 64-bit NTP timestamp. A value of 0 indicates that sub-second resolution is unavailable. [RFC 5357 §4.1.2]"

  - id: twampErrorEstimate
    name: Error Estimate
    type: { kind: int, bits: 16 }
    category: variable
    doc: "Estimate of the error and uncertainty of the associated timestamp. Bit 15 (S) selects the timescale (1=NTP, 0=PTP/other); bit 14 (Z) MUST be zero; bits 13-8 carry a base-2 scale exponent; bits 7-0 carry a multiplier. The product of multiplier and 2^scale gives the estimated one-way error in seconds. [RFC 5357 §4.1.2]"

  - id: twampPadding
    name: Padding
    type: { kind: bytes, n: { kind: remaining } }
    category: payload-marker
    doc: "Zero-filled packet padding appended after the fixed fields to reach the test packet size negotiated during TWAMP-Control setup (the Session-Sender Padding Length). The TWAMP-Test packet carries no on-wire padding-length field, so the padding runs from immediately after the Error Estimate to the end of the UDP datagram and is consumed as the remaining bytes of the packet. When the negotiated padding is zero, no padding is present and the packet is exactly 14 bytes (Sequence Number 4 + Timestamp 8 + Error Estimate 2), the minimum data segment length in unauthenticated mode. [RFC 5357 §4.1.2, RFC 4656 §4.1.2]"
