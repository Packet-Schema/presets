# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: PIM Bootstrap
rowBits: 32
byteOrder: BE
description: >-
  PIM Bootstrap Message (BSM) (RFC 5059, message type 4). Sent by the elected
  Bootstrap Router (BSR) to distribute Rendezvous Point (RP) set information
  throughout a PIM-SM domain. Each router on the path floods the BSM out all
  PIM-enabled interfaces (except the one it arrived on), building a
  domain-wide BSR election and RP-set distribution mechanism. The message
  carries one or more Group-to-RP mappings: each group prefix is paired with
  a list of candidate RPs, their priority, and hold times, enabling routers
  to compute a consistent hash-based RP assignment for any given group address.
  Transmitted over IP protocol 103 to the ALL-PIM-ROUTERS group 224.0.0.13.
body:
  - id: pimVersion
    name: Version
    type: { kind: int, bits: 4 }
    category: type
    defaultValue: 2
    doc: >-
      PIM protocol version number. MUST be 2 for PIM-SM; a router receiving
      any other value MUST silently discard the message. [RFC 5059 §4]
  - id: pimType
    name: Type
    type: { kind: int, bits: 4 }
    category: type
    defaultValue: 4
    doc: >-
      PIM message type. 4 = Bootstrap (this preset). Other values: 0=Hello,
      1=Register, 2=Register-Stop, 3=Join/Prune, 5=Assert,
      8=Candidate-RP-Advertisement. [RFC 5059 §4]
  - id: pimNoForward
    name: N
    type: { kind: bits, n: 1 }
    category: flags
    doc: >-
      No-Forward bit. When set, this Bootstrap message fragment MUST NOT be
      forwarded; it is used for unicast BSM delivery (e.g. on a new or
      rebooting router) so that the fragment is processed locally but not
      flooded. This bit is specific to the Bootstrap Message header.
      [RFC 5059 §4]
  - id: pimReserved
    name: Reserved
    type: { kind: bits, n: 7 }
    category: reserved
    doc: >-
      Reserved bits; MUST be set to zero on transmission and ignored on
      receipt. [RFC 5059 §4]
  - id: pimChecksum
    name: Checksum
    type: { kind: int, bits: 16 }
    category: checksum
    doc: >-
      One's-complement checksum computed over the entire Bootstrap message
      (header and all Group Set records) with this field set to zero. A
      receiver MUST verify the checksum and silently discard the message on
      failure. [RFC 5059 §4]
  - id: pimFragmentTag
    name: Fragment Tag
    type: { kind: int, bits: 16 }
    category: identifier
    doc: >-
      Random value generated by the BSR for each complete Bootstrap message.
      All fragments of the same BSM carry the same Fragment Tag, allowing
      receivers to reassemble fragmented messages and to detect duplicate
      fragments. [RFC 5059 §4]
  - id: pimHashMaskLen
    name: Hash Mask Len
    type: { kind: int, bits: 8 }
    category: length
    doc: >-
      Number of bits (counting from the most significant) of the group
      address used in the hash function that maps a multicast group to an RP.
      Typical value: 30 for IPv4 (allowing up to 4 adjacent groups to share
      an RP). Receivers use this value when computing the RP hash. [RFC 5059 §4]
  - id: pimBsrPriority
    name: BSR Priority
    type: { kind: int, bits: 8 }
    category: identifier
    doc: >-
      Priority of the originating Candidate-BSR. Higher numerical value
      indicates higher priority. During BSR election, a router with higher
      priority wins; ties are broken by the numerically larger IP address.
      [RFC 5059 §4]
  - kind: group
    id: pimBsrAddress
    name: BSR Address (Encoded-Unicast)
    children:
      - id: pimBsrAddrFamily
        name: Addr Family
        type: { kind: int, bits: 8 }
        category: type
        defaultValue: 1
        doc: >-
          Address family of the BSR unicast address. 1 = IPv4, 2 = IPv6.
          Defined by the IANA "Address Family Numbers" registry. [RFC 5059 §4]
      - id: pimBsrEncodingType
        name: Encoding Type
        type: { kind: int, bits: 8 }
        category: type
        defaultValue: 0
        doc: >-
          Encoding type for the unicast address that follows. 0 = native
          encoding for the address family in Addr Family. [RFC 5059 §4]
      - id: pimBsrUnicastAddr
        name: BSR Unicast Address
        type: { kind: int, bits: 32 }
        category: addressing
        doc: >-
          IPv4 unicast address of the originating Bootstrap Router (BSR).
          Used by PIM routers to elect the BSR (highest priority/address wins)
          and to unicast Candidate-RP-Advertisement messages toward the BSR.
          [RFC 5059 §4]
  - id: pimBsrGroupCount
    name: No. of Group Sets
    type: { kind: int, bits: 8 }
    category: length
    doc: >-
      Number of Group Set records that follow in this message fragment. Each
      Group Set associates one multicast group prefix with a list of
      Candidate-RPs. A value of 0 is valid (BSR election only, no RP
      mappings). [RFC 5059 §4]
  - kind: repeat
    id: pimGroupSets
    name: Group Sets
    category: variable
    count: { kind: ref, field: pimBsrGroupCount }
    element:
      id: pimGroupSet
      fields:
        - id: gsAddrFamily
          name: Addr Family
          type: { kind: int, bits: 8 }
          category: type
          defaultValue: 1
          doc: >-
            Address family of the encoded group address. 1 = IPv4, 2 = IPv6.
            [RFC 5059 §4]
        - id: gsEncodingType
          name: Encoding Type
          type: { kind: int, bits: 8 }
          category: type
          defaultValue: 0
          doc: >-
            Encoding type for the group address. 0 = native encoding for the
            specified address family. [RFC 5059 §4]
        - kind: group
          id: gsGroupFlags
          name: Group Flags
          children:
            - id: gsB
              name: B
              type: { kind: bits, n: 1 }
              category: flags
              doc: >-
                Bidirectional PIM (BIDIR-PIM) bit. When set, the group uses
                bidirectional trees and the RP list entries are Rendezvous
                Point addresses for BIDIR-PIM trees. 0 for standard PIM-SM.
                [RFC 5059 §4]
            - id: gsReservedFlags
              name: Reserved
              type: { kind: bits, n: 6 }
              category: reserved
              doc: >-
                Reserved flag bits; MUST be zero on transmit and ignored on
                receipt. [RFC 5059 §4]
            - id: gsZ
              name: Z
              type: { kind: bits, n: 1 }
              category: flags
              doc: >-
                Admin Scope Zone (Z) bit. When set, indicates that the group
                range is an administratively scoped zone boundary. Used in
                conjunction with BIDIR-PIM scope zones. 0 for standard
                PIM-SM. [RFC 5059 §4]
        - id: gsMaskLen
          name: Mask Len
          type: { kind: int, bits: 8 }
          category: length
          defaultValue: 4
          doc: >-
            Length in bits of the group address mask. Defines the multicast
            group prefix to which this Group Set applies. For example, 4
            covers the entire 224.0.0.0/4 IPv4 multicast range. [RFC 5059 §4]
        - id: gsGroupAddr
          name: Group Address
          type: { kind: int, bits: 32 }
          category: addressing
          doc: >-
            IPv4 multicast group address prefix. Together with Mask Len,
            identifies the range of multicast groups whose RP is determined
            from the RP list in this Group Set. [RFC 5059 §4]
        - id: gsRpCount
          name: RP Count
          type: { kind: int, bits: 8 }
          category: length
          doc: >-
            Total number of Candidate-RP entries for this group prefix included
            in this Group Set record. Routers receiving the BSM use all RP
            Count entries to build the candidate RP set for subsequent hash
            computation. [RFC 5059 §4]
        - id: gsFragRpCount
          name: Frag RP Count
          type: { kind: int, bits: 8 }
          category: length
          doc: >-
            Number of Candidate-RP entries actually present in this message
            fragment for this group prefix. When the full RP list must be
            split across multiple BSM fragments, Frag RP Count may be less
            than RP Count; reassembly uses Fragment Tag to reconstruct the
            complete set. [RFC 5059 §4]
        - id: gsReserved
          name: Reserved
          type: { kind: int, bits: 16 }
          category: reserved
          doc: >-
            Reserved field following Frag RP Count; MUST be set to zero on
            transmission and ignored on receipt. [RFC 5059 §4]
        - kind: repeat
          id: gsRpEntries
          name: RP Entries
          category: variable
          count: { kind: ref, field: gsFragRpCount }
          element:
            id: rpEntry
            fields:
              - id: rpAddrFamily
                name: Addr Family
                type: { kind: int, bits: 8 }
                category: type
                defaultValue: 1
                doc: >-
                  Address family of the Candidate-RP unicast address. 1 = IPv4,
                  2 = IPv6. [RFC 5059 §4]
              - id: rpEncodingType
                name: Encoding Type
                type: { kind: int, bits: 8 }
                category: type
                defaultValue: 0
                doc: >-
                  Encoding type for the RP unicast address. 0 = native encoding
                  for the specified address family. [RFC 5059 §4]
              - id: rpUnicastAddr
                name: RP Unicast Address
                type: { kind: int, bits: 32 }
                category: addressing
                doc: >-
                  IPv4 unicast address of a Candidate Rendezvous Point for the
                  group prefix in this Group Set. PIM routers apply a
                  hash function (seeded by Hash Mask Len) to select one RP from
                  the candidate list for each multicast group in the prefix.
                  [RFC 5059 §4]
              - id: rpHoldTime
                name: RP Holdtime
                type: { kind: int, bits: 16 }
                category: identifier
                doc: >-
                  Time in seconds for which this RP-to-group mapping should be
                  kept in the absence of further Bootstrap messages. 0 indicates
                  that the mapping should be deleted immediately. 0xFFFF means
                  the mapping never expires. [RFC 5059 §4]
              - id: rpPriority
                name: RP Priority
                type: { kind: int, bits: 8 }
                category: identifier
                doc: >-
                  Priority of this Candidate-RP for the given group prefix.
                  Lower numerical value means higher priority. When computing the
                  RP hash, routers prefer the RP set with the lowest priority
                  value; ties within a priority are broken by the hash function.
                  [RFC 5059 §4]
              - id: rpReserved
                name: Reserved
                type: { kind: int, bits: 8 }
                category: reserved
                doc: >-
                  Reserved byte following RP Priority; MUST be set to zero on
                  transmission and ignored on receipt. [RFC 5059 §4]
