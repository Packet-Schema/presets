# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: DHCPv6
rowBits: 32
byteOrder: BE
description: DHCPv6 message format (RFC 8415). Provides stateful and stateless address autoconfiguration for IPv6 hosts.
body:
  - { id: msgType, name: Message Type, type: { kind: int, bits: 8 }, category: type, doc: "Message type code (1=Solicit, 2=Advertise, 3=Request, 4=Confirm, 5=Renew, 6=Rebind, 7=Reply, 8=Release, 9=Decline, 10=Reconfigure, 11=Information-request, 12=Relay-forw, 13=Relay-repl)" }
  - { id: transactionId, name: Transaction ID, type: { kind: int, bits: 24 }, category: identifier, doc: "Unique transaction identifier generated by the client to match requests and replies" }
  - kind: repeat
    id: options
    element:
      id: option
      fields:
        - { id: optionCode, name: Option Code, type: { kind: int, bits: 16 }, category: type, doc: "Option type code (1=CLIENTID, 2=SERVERID, 3=IA_NA, 5=IAADDR, 6=ORO, 8=ELAPSED_TIME, 23=DNS_SERVERS, 24=DOMAIN_LIST, ...)" }
        - { id: optionLen, name: Option Length, type: { kind: int, bits: 16 }, category: length, doc: "Length in octets of the option data field" }
        - { id: optionData, name: Option Data, type: { kind: bytes, n: { kind: ref, field: "optionLen" } }, category: payload-marker, doc: "Variable-length option data whose content depends on the option code" }
    count: { kind: ref, field: "dhcpv6OptCount" }
