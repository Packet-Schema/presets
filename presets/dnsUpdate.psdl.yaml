# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: DNS UPDATE
rowBits: 32
byteOrder: BE
description: "DNS UPDATE message (RFC 2136) — the dynamic DNS update mechanism that allows authorised clients to add, delete, or modify resource records in a zone without a full zone transfer. The 12-byte header is identical in wire layout to the standard DNS header (RFC 1035 §4.1.1) but the four section-count fields are renamed: ZOCOUNT (Zone), PRCOUNT (Prerequisite), UPCOUNT (Update), and ADCOUNT (Additional). The Opcode field in the Flags word must be 5 (UPDATE). Sections follow the header: the Zone section (exactly one SOA-class question), Prerequisite section (RRs that must pre-exist or must not exist), Update section (RRs to add or delete), and Additional section (e.g. TSIG/SIG(0) for authenticated updates)."
body:
  # ---- Header (12 bytes, RFC 2136 §2) ------------------------------------------
  - id: updateId
    name: ID
    type: { kind: bits, n: 16 }
    category: identifier
    doc: "16-bit random message ID generated by the requestor and echoed by the server in the corresponding response, used to match replies to outstanding requests. [RFC 2136 §2, RFC 1035 §4.1.1]"
  - kind: group
    id: updateFlags
    name: Flags
    children:
      - id: updateQr
        name: QR
        type: { kind: bits, n: 1 }
        category: flags
        doc: "Query/Response bit — 0 in an UPDATE request sent by the client, 1 in the UPDATE response returned by the server. [RFC 2136 §2, RFC 1035 §4.1.1]"
      - id: updateOpcode
        name: Opcode
        type: { kind: bits, n: 4 }
        category: flags
        doc: "Operation code — must be 5 (UPDATE) in all DNS UPDATE messages. Values: 0=QUERY, 2=STATUS, 4=NOTIFY, 5=UPDATE. A server receiving a message with any other opcode on the UPDATE port should return FORMERR or NOTIMP. [RFC 2136 §2.2, RFC 1035 §4.1.1]"
      - id: updateZ
        name: Z
        type: { kind: bits, n: 7 }
        category: reserved
        doc: "Reserved bits — must be zero on transmission and ignored on receipt. Corresponds to the AA/TC/RD/RA/Z sub-fields of the standard DNS Flags word; none of these flags carry meaning in an UPDATE message. [RFC 2136 §2, RFC 1035 §4.1.1]"
      - id: updateRcode
        name: RCODE
        type:
          kind: enum
          bits: 4
          variants:
            0: NOERROR (update accepted)
            1: FORMERR (format error)
            2: SERVFAIL (server failure)
            3: NXDOMAIN (name does not exist)
            4: NOTIMP (not implemented)
            5: REFUSED (policy refusal)
            6: YXDOMAIN (name exists but should not)
            7: YXRRSET (RR set exists but should not)
            8: NXRRSET (RR set does not exist)
            9: NOTAUTH (server not authoritative for zone)
            10: NOTZONE (name not in zone)
        category: flags
        doc: "Response Code — set to 0 (NOERROR) in requests; the server fills this field in the response. Values 6–10 are UPDATE-specific errors defined by RFC 2136. [RFC 2136 §2.2, §3.8]"
  - id: updateZoCount
    name: ZOCOUNT
    type: { kind: bits, n: 16 }
    category: length
    doc: "Zone section count — number of zone entries (exactly 1 in a well-formed UPDATE: the zone's SOA-class owner name, TYPE=SOA, CLASS=IN). Drives the Zone Section Repeat container below. [RFC 2136 §2.3]"
  - id: updatePrCount
    name: PRCOUNT
    type: { kind: bits, n: 16 }
    category: length
    doc: "Prerequisite section count — number of RRs in the Prerequisite section that must be satisfied for the update to proceed. Zero means no prerequisites. Drives the Prerequisite Section Repeat below. [RFC 2136 §2.4]"
  - id: updateUpCount
    name: UPCOUNT
    type: { kind: bits, n: 16 }
    category: length
    doc: "Update section count — number of RRs specifying records to add or delete. Zero is legal but means a no-op update. Drives the Update Section Repeat below. [RFC 2136 §2.5]"
  - id: updateAdCount
    name: ADCOUNT
    type: { kind: bits, n: 16 }
    category: length
    doc: "Additional section count — number of additional RRs (e.g. TSIG pseudo-RR for transaction authentication, or SIG(0) for public-key authentication). Zero means unauthenticated. Drives the Additional Section Repeat below. [RFC 2136 §2.6, RFC 2845, RFC 2535 §3.5]"

  # ---- Zone section (RFC 2136 §2.3) -------------------------------------------
  - kind: repeat
    id: updateZoneSection
    name: Zone Section
    category: variable
    count: { kind: ref, field: updateZoCount }
    doc: "Exactly one Zone entry identifying the zone to be updated: ZNAME (owner name of the zone), ZTYPE (must be SOA=6), and ZCLASS (must be IN=1). Empty by default (ZOCOUNT=0). [RFC 2136 §2.3]"
    element:
      id: updateZoneEntry
      fields:
        - id: updateZName
          name: ZNAME
          type: { kind: bits, n: 16 }
          category: addressing
          doc: "Owner name of the zone to be updated, encoded as an uncompressed DNS domain-name label sequence. Modeled here as a 16-bit compression-pointer placeholder consistent with the Answer section of dnsResponse.psdl.yaml. [RFC 2136 §2.3, RFC 1035 §4.1.4]"
        - id: updateZType
          name: ZTYPE
          type:
            kind: enum
            bits: 16
            variants:
              6: SOA (start of authority)
          category: type
          doc: "Zone record type — must be SOA (6) in a valid UPDATE message. Any other value should be rejected with FORMERR. [RFC 2136 §2.3]"
        - id: updateZClass
          name: ZCLASS
          type:
            kind: enum
            bits: 16
            variants:
              1: IN (Internet)
              3: CH (Chaos)
              4: HS (Hesiod)
          category: type
          doc: "Zone class — must be the class of the zone being updated (almost always IN=1). Determines the class context for all RRs in the Prerequisite and Update sections. [RFC 2136 §2.3, RFC 1035 §3.2.4]"

  # ---- Prerequisite section (RFC 2136 §2.4, §3.2) -----------------------------
  - kind: repeat
    id: updatePrereqSection
    name: Prerequisite Section
    category: variable
    count: { kind: ref, field: updatePrCount }
    doc: "PRCOUNT prerequisite RRs that must be satisfied before the update is applied. A CLASS of ANY means 'this RR (or RR set) must exist'; NONE means 'must not exist'. Empty by default (PRCOUNT=0). [RFC 2136 §2.4, §3.2]"
    element:
      id: updatePrereqRr
      fields:
        - id: updatePrName
          name: NAME
          type: { kind: bits, n: 16 }
          category: addressing
          doc: "Owner name of the prerequisite RR, typically a 2-byte DNS compression pointer back into the Zone ZNAME. [RFC 2136 §2.4, RFC 1035 §4.1.4]"
        - id: updatePrType
          name: TYPE
          type:
            kind: enum
            bits: 16
            variants:
              1: A (IPv4 address)
              2: NS (name server)
              5: CNAME (canonical name)
              6: SOA (start of authority)
              12: PTR (domain pointer)
              15: MX (mail exchange)
              16: TXT (text)
              28: AAAA (IPv6 address)
              33: SRV (service location)
              255: ANY (any type)
          category: type
          doc: "Resource record type for the prerequisite check. ANY (255) may be used to test for name existence without regard to type. [RFC 2136 §2.4, §3.2.3, RFC 1035 §3.2.2]"
        - id: updatePrClass
          name: CLASS
          type:
            kind: enum
            bits: 16
            variants:
              1: IN (Internet)
              254: NONE (must-not-exist check)
              255: ANY (must-exist check)
          category: type
          doc: "Prerequisite class — ANY (255) means 'the specified name/type must exist'; NONE (254) means 'must not exist'; IN (1) means 'the exact RR set must exist with the specified RDATA'. [RFC 2136 §2.4, §3.2]"
        - id: updatePrTtl
          name: TTL
          type: { kind: bits, n: 32 }
          category: variable
          doc: "TTL — must be zero in prerequisite RRs; the server ignores this field but a sender must set it to 0 per RFC 2136. [RFC 2136 §2.4]"
        - id: updatePrRdLength
          name: RDLENGTH
          type: { kind: bits, n: 16 }
          category: length
          doc: "Length in octets of the RDATA below. Set to 0 for must-exist/must-not-exist checks that use CLASS ANY or NONE without specifying exact RDATA. [RFC 2136 §2.4, RFC 1035 §3.2.1]"
        - id: updatePrRdata
          name: RDATA
          type: { kind: bytes, n: { kind: ref, field: updatePrRdLength } }
          category: variable
          doc: "Record data for value-match prerequisites (CLASS=IN). Zero-length when CLASS is ANY or NONE. Opaque RDLENGTH bytes in the class/type-specific wire format. [RFC 2136 §2.4, §3.2.2, RFC 1035 §3.2.1]"

  # ---- Update section (RFC 2136 §2.5, §3.4) -----------------------------------
  - kind: repeat
    id: updateUpdateSection
    name: Update Section
    category: variable
    count: { kind: ref, field: updateUpCount }
    doc: "UPCOUNT RRs specifying the actual changes: CLASS=IN adds a record; CLASS=NONE deletes a specific RR; CLASS=ANY with RDLENGTH=0 deletes an entire RR set or all RRs for a name. Empty by default (UPCOUNT=0). [RFC 2136 §2.5, §3.4]"
    element:
      id: updateRr
      fields:
        - id: updateUpName
          name: NAME
          type: { kind: bits, n: 16 }
          category: addressing
          doc: "Owner name of the RR to be added or deleted, typically encoded as a 2-byte DNS compression pointer referencing the Zone ZNAME. [RFC 2136 §2.5, RFC 1035 §4.1.4]"
        - id: updateUpType
          name: TYPE
          type:
            kind: enum
            bits: 16
            variants:
              1: A (IPv4 address)
              2: NS (name server)
              5: CNAME (canonical name)
              6: SOA (start of authority)
              12: PTR (domain pointer)
              15: MX (mail exchange)
              16: TXT (text)
              28: AAAA (IPv6 address)
              33: SRV (service location)
              255: ANY (all types — used with delete-all)
          category: type
          doc: "Record type for the update operation. ANY (255) combined with CLASS=ANY and RDLENGTH=0 means delete all RRs for this name. [RFC 2136 §2.5, §3.4, RFC 1035 §3.2.2]"
        - id: updateUpClass
          name: CLASS
          type:
            kind: enum
            bits: 16
            variants:
              1: IN (add this RR to the zone)
              254: NONE (delete this specific RR)
              255: ANY (delete RR set or all RRs for name)
          category: type
          doc: "Update class — IN (1) adds the RR; NONE (254) deletes the exact RR matching TYPE and RDATA; ANY (255) deletes the entire RR set (or all RRs if TYPE is also ANY). [RFC 2136 §2.5, §3.4.2]"
        - id: updateUpTtl
          name: TTL
          type: { kind: bits, n: 32 }
          category: variable
          doc: "Time To Live in seconds for the added record (CLASS=IN); must be zero for delete operations (CLASS=ANY or NONE). [RFC 2136 §2.5, §3.4.2.2, RFC 1035 §3.2.1]"
        - id: updateUpRdLength
          name: RDLENGTH
          type: { kind: bits, n: 16 }
          category: length
          doc: "Length in octets of the RDATA below. Set to 0 for delete-all-RRsets (CLASS=ANY, TYPE=ANY) and delete-RRset (CLASS=ANY, TYPE=<type>) operations. [RFC 2136 §2.5, RFC 1035 §3.2.1]"
        - id: updateUpRdata
          name: RDATA
          type: { kind: bytes, n: { kind: ref, field: updateUpRdLength } }
          category: variable
          doc: "Resource record data in the class/type-specific wire format. For add operations (CLASS=IN) this is the full RR value (e.g. 4-byte IPv4 address for A, 16-byte IPv6 for AAAA). Zero-length for delete-all operations. [RFC 2136 §2.5, §3.4.2, RFC 1035 §3.3]"

  # ---- Additional section (RFC 2136 §2.6) -------------------------------------
  - kind: repeat
    id: updateAdditionalSection
    name: Additional Section
    category: variable
    count: { kind: ref, field: updateAdCount }
    doc: "ADCOUNT additional RRs, most commonly a TSIG pseudo-RR (TYPE=250) for HMAC-based transaction authentication or a SIG(0) RR for public-key authentication. Empty by default (ADCOUNT=0). [RFC 2136 §2.6, RFC 2845 §2, RFC 2535 §3.5]"
    element:
      id: updateAdRr
      fields:
        - id: updateAdName
          name: NAME
          type: { kind: bits, n: 16 }
          category: addressing
          doc: "Owner name of the additional RR. For TSIG this is the key name (as a domain name, e.g. 'mykey.example.com.'), typically carried uncompressed. [RFC 2845 §2.3, RFC 1035 §4.1.4]"
        - id: updateAdType
          name: TYPE
          type:
            kind: enum
            bits: 16
            variants:
              1: A (IPv4 address)
              28: AAAA (IPv6 address)
              41: OPT (EDNS0 pseudo-RR)
              250: TSIG (transaction signature)
              24: SIG (SIG(0) public-key signature)
          category: type
          doc: "Record type for the additional RR. TSIG (250) and SIG(0) (24) are the most common in UPDATE messages to provide transaction authentication. OPT (41) may appear for EDNS0. [RFC 2845 §2.3, RFC 2535 §3.5, RFC 6891 §6.1.1]"
        - id: updateAdClass
          name: CLASS
          type:
            kind: enum
            bits: 16
            variants:
              1: IN (Internet)
              255: ANY (class-independent, used by TSIG/SIG(0))
          category: type
          doc: "Record class. TSIG and SIG(0) use ANY (255) because they are class-independent transaction authentication records. [RFC 2845 §2.3, RFC 1035 §3.2.4]"
        - id: updateAdTtl
          name: TTL
          type: { kind: bits, n: 32 }
          category: variable
          doc: "TTL — must be zero for TSIG and SIG(0) records; ignored by the server but senders must set it to 0. [RFC 2845 §2.3, RFC 2535 §3.5]"
        - id: updateAdRdLength
          name: RDLENGTH
          type: { kind: bits, n: 16 }
          category: length
          doc: "Length in octets of the RDATA below. For TSIG this includes the algorithm name, times, MAC, original ID, error, and other-data fields. [RFC 2845 §2.3, RFC 1035 §3.2.1]"
        - id: updateAdRdata
          name: RDATA
          type: { kind: bytes, n: { kind: ref, field: updateAdRdLength } }
          category: payload-marker
          doc: "Type-specific record data. For TSIG: algorithm name (domain-name), Time Signed (48-bit), Fudge (16-bit), MAC Size (16-bit), MAC, Original ID (16-bit), Error (16-bit), Other Len (16-bit), Other Data — all packed to RDLENGTH bytes. Carried opaque here. [RFC 2845 §2.3, RFC 2136 §2.6]"
