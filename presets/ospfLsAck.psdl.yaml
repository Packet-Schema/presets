# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: OSPFv2 Link State Acknowledgment Packet
rowBits: 32
byteOrder: BE
description: OSPFv2 Link State Acknowledgment packet (RFC 2328 Appendix A.3.6, packet type 5). 24-byte OSPF common header followed by zero or more 20-byte LSA headers. LS Ack packets are sent to explicitly acknowledge receipt of LSA flooding updates; each acknowledged LSA is identified by its 20-byte header. Acknowledgments may be delayed and batched, or sent immediately as direct unicast replies, depending on interface type and the timing rules in RFC 2328 §13.5.
meta:
  family: ospf
  tags: [internet-layer, routing, control-plane, reliability]
body:
  - id: version
    name: Version
    type: { kind: int, bits: 8 }
    category: type
    defaultValue: 2
    doc: OSPF protocol version. Always 2 for OSPFv2 (OSPFv3 for IPv6 uses a separate packet format). [RFC 2328 §A.3.1]
  - id: packetType
    name: Type
    type: { kind: int, bits: 8 }
    category: type
    defaultValue: 5
    doc: OSPF packet type. 1=Hello, 2=Database Description, 3=Link State Request, 4=Link State Update, 5=Link State Acknowledgment (this preset). [RFC 2328 §A.3.1]
  - id: packetLength
    name: Packet Length
    type: { kind: int, bits: 16 }
    category: length
    doc: Length of the OSPF packet in bytes, including the 24-byte common header. For an LS Ack with N LSA headers = 24 + 20 × N. [RFC 2328 §A.3.1]
  - id: routerId
    name: Router ID
    type: { kind: int, bits: 32 }
    category: identifier
    doc: 32-bit identifier of the originating router. Written in dotted-quad form like an IPv4 address; conventionally chosen as the largest IP address configured on the router, or a manually assigned value. Must be unique within the OSPF routing domain. [RFC 2328 §A.3.1]
  - id: areaId
    name: Area ID
    type: { kind: int, bits: 32 }
    category: identifier
    doc: 32-bit identifier of the OSPF area this packet belongs to. 0.0.0.0 is the backbone area. The receiving router discards packets whose Area ID does not match the receiving interface. [RFC 2328 §A.3.1]
  - id: checksum
    name: Checksum
    type: { kind: int, bits: 16 }
    category: checksum
    doc: Standard IP checksum (one's complement of one's-complement 16-bit sum) over the entire OSPF packet excluding the 64-bit Authentication field. [RFC 2328 §A.3.1]
  - id: authType
    name: Authentication Type
    type: { kind: int, bits: 16 }
    category: type
    defaultValue: 0
    doc: Authentication scheme applied per-interface. 0=Null (no authentication), 1=Simple password, 2=Cryptographic (MD5/HMAC). [RFC 2328 §D.1]
  - id: authentication
    name: Authentication
    type: { kind: bits, n: 64 }
    category: identifier
    doc: 64-bit authentication payload whose meaning is set by Authentication Type. Null→zero; Simple→ASCII password padded with zeros; Cryptographic→2-byte reserved (0) || 1-byte Key ID || 1-byte Auth Data Length || 4-byte cryptographic sequence number, with the actual MAC appended after the packet. [RFC 2328 §D.3]
  - kind: bounded
    id: lsaHeadersScope
    name: LSA Header List
    bytes: { kind: op, op: "-", a: { kind: ref, field: packetLength }, b: { kind: lit, value: 24 } }
    doc: "Length-delimited region holding the acknowledged LSA headers. Its byte budget is the Packet Length minus the 24-byte OSPF common header; the list carries no explicit element count, so the bounded scope confines the `count: eos` repeat to exactly these octets (each header is a fixed 20 bytes). [RFC 2328 §A.3.6]"
    fields:
      - kind: repeat
        id: lsaHeaders
        name: LSA Header List
        category: variable
        doc: Zero or more 20-byte LSA headers, one per acknowledged LSA. The receiver uses each header's (LS Type, Link State ID, Advertising Router) tuple to identify the exact LSA being acknowledged and marks the corresponding flooding retransmission timer as satisfied. [RFC 2328 §A.3.6 / §A.4.1]
        count: eos
        element:
          id: lsaHeaderRecord
          fields:
            - id: lsAge
              name: LS Age
              type: { kind: int, bits: 16 }
              category: identifier
              doc: Time in seconds since the LSA was originated. Copied verbatim from the LSA header being acknowledged; used together with the LS Sequence Number to confirm the exact instance. [RFC 2328 §A.4.1]
            - id: lsaOptions
              name: Options
              type: { kind: int, bits: 8 }
              category: flags
              doc: Optional capabilities supported by the described portion of the routing domain, encoded with the same bit assignments as the common Options field. Copied from the acknowledged LSA header. [RFC 2328 §A.4.1]
            - id: lsType
              name: LS Type
              type: { kind: int, bits: 8 }
              category: type
              doc: LSA type identifying the class of topology information. 1=Router-LSA, 2=Network-LSA, 3=Summary-LSA (IP network), 4=Summary-LSA (ASBR), 5=AS-external-LSA. [RFC 2328 §A.4.1]
            - id: linkStateId
              name: Link State ID
              type: { kind: int, bits: 32 }
              category: identifier
              doc: Identifies the portion of the routing domain described by the LSA; meaning depends on LS Type (e.g. originating Router ID for Router-LSAs, IP network number for Summary-LSAs). [RFC 2328 §A.4.1]
            - id: advertisingRouter
              name: Advertising Router
              type: { kind: int, bits: 32 }
              category: identifier
              doc: Router ID of the router that originated the LSA (dotted-quad on the wire). Together with LS Type and Link State ID, uniquely identifies the LSA being acknowledged. [RFC 2328 §A.4.1]
            - id: lsSeqNum
              name: LS Sequence Number
              type: { kind: int, bits: 32 }
              category: identifier
              doc: Signed 32-bit number incremented each time the LSA is re-originated. The acknowledging router copies this from the received LSA to confirm the specific instance being acknowledged. [RFC 2328 §A.4.1]
            - id: lsChecksum
              name: LS Checksum
              type: { kind: int, bits: 16 }
              category: checksum
              doc: Fletcher checksum over the complete contents of the LSA excluding the LS Age field, copied from the acknowledged LSA header. [RFC 2328 §A.4.1]
            - id: lsaLength
              name: Length
              type: { kind: int, bits: 16 }
              category: length
              doc: Length in bytes of the original LSA, including its 20-byte header, copied from the acknowledged LSA header. [RFC 2328 §A.4.1]
