# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: PCIe TLP Fragment (Illustrative)
rowBits: 32
byteOrder: BE
description: Illustrative — not a real PCIe TLP. Demonstrates PSDL 0.4 per-field byteOrder by mixing a BE 32-bit address with an LE 16-bit length field in the same packet. Use this preset only as a fixture for the byteOrder badge.
body:
  - id: fmtType
    name: Fmt/Type
    type:
      kind: bits
      n: 8
    category: type
    doc: 8-bit leading byte standing in for a TLP's Format/Type field — illustrative only, with no real PCIe encoding implied. Uses the BE packet default. [illustrative fixture]
  - id: address
    name: Address (BE)
    type:
      kind: int
      bits: 32
    byteOrder: BE
    category: addressing
    doc: 32-bit address field — explicitly BE for documentation purposes.
  - id: length
    name: Length (LE)
    type:
      kind: int
      bits: 16
    byteOrder: LE
    category: length
    doc: 16-bit length field — LE on the wire despite the BE packet default.
  - id: tail
    name: Tail
    type:
      kind: bits
      n: 8
    category: reserved
    doc: 8-bit trailing reserved byte that pads the fragment to a row boundary — illustrative only, carries no defined meaning. Uses the BE packet default. [illustrative fixture]
