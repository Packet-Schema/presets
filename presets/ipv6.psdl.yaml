# yaml-language-server: $schema=../../schemas/psdl.schema.json
name: IPv6 Header
rowBits: 32
byteOrder: Network byte order (big-endian, MSB-first). Addresses are transmitted high-group first; e.g. 2001:db8::1 is sent as 0x2001 0x0db8 ... 0x0001.
description: Internet Protocol version 6 header (RFC 8200 §3). Fixed 40 bytes; optional features such as fragmentation and routing live in chained extension headers selected by Next Header.
body:
  - id: version
    name: Version
    type:
      kind: bits
      n: 4
    category: type
    doc: IP version field — always 6 for IPv6, distinguishing this header from an IPv4 header that begins with 4. [RFC 8200 §3]
  - id: trafficClass
    name: Traffic Class
    type:
      kind: bits
      n: 8
    category: type
    doc: "Equivalent of IPv4's DSCP+ECN packed into one byte: top 6 bits are DSCP for QoS classification, bottom 2 bits are ECN for congestion signalling. [RFC 8200, RFC 2474, RFC 3168]"
  - id: flowLabel
    name: Flow Label
    type:
      kind: bits
      n: 20
    category: identifier
    doc: 20-bit label tagging packets that belong to the same flow (e.g. one TCP connection) so routers can keep them on the same path without parsing L4 headers. [RFC 6437]
  - id: payloadLength
    name: Payload Length
    type:
      kind: bits
      n: 16
    category: length
    doc: Bytes of payload following this header, including any extension headers. 0 means a Jumbogram (length carried in a Hop-by-Hop option, allowing packets >65535 bytes). [RFC 8200, RFC 2675]
  - id: nextHeader
    name: Next Header
    type:
      kind: bits
      n: 8
    category: type
    doc: Type of the immediately following header — uses the same numbering as IPv4 Protocol. e.g. 6=TCP, 17=UDP, 58=ICMPv6, 0=Hop-by-Hop, 43=Routing, 44=Fragment, 50=ESP, 51=AH.
  - id: hopLimit
    name: Hop Limit
    type:
      kind: bits
      n: 8
    category: identifier
    doc: Hop counter decremented by each forwarding router; the packet is dropped at 0. IPv6 equivalent of IPv4 TTL; default is typically 64. [RFC 8200]
  - id: srcAddr
    name: Source Address
    type:
      kind: bits
      n: 128
    category: addressing
    doc: "128-bit sender address — written as eight 16-bit hex groups, with :: collapsing one run of zero groups. e.g. 2001:db8::1, fe80::1 (link-local). [RFC 4291]"
  - id: dstAddr
    name: Destination Address
    type:
      kind: bits
      n: 128
    category: addressing
    doc: 128-bit receiver address — also supports multicast (ff00::/8) and anycast. e.g. 2606:4700:4700::1111 is one of Cloudflare's public DNS resolvers. [RFC 4291]
  - kind: repeat
    id: nextHeader_chain
    name: Next Header (chain)
    category: type
    doc: IPv6 extension-header chain. Sits after the 40-byte base header (RFC 8200 §4); each entry is selected by the preceding Next Header value.
    element:
      id: nextHeader_chainRecord
      fields:
        - kind: switch
          id: nextHeader_byProto
          on:
            kind: ref
            field: nextHeader_proto
          cases:
            "0":
              id: nextHeader_proto_0
              name: Hop-by-Hop Options
              fields:
                - id: nextHeader
                  name: Next Header
                  type:
                    kind: bits
                    n: 8
                  doc: Type of the header following this Hop-by-Hop Options header, using the same Next Header numbering as the base header. [RFC 8200 §4.3]
                - id: hdrExtLen
                  name: Hdr Ext Len
                  type:
                    kind: bits
                    n: 8
                  doc: Length of this header in 8-byte units, not counting the first 8 bytes. 0 means an 8-byte header. [RFC 8200 §4.3]
                - id: options
                  name: Options + padding
                  type:
                    kind: bits
                    n: 48
                  doc: One or more TLV-encoded options examined by every node on the path, padded so the header ends on an 8-byte boundary. [RFC 8200 §4.2, §4.3]
            "43":
              id: nextHeader_proto_43
              name: Routing
              fields:
                - id: nextHeader
                  name: Next Header
                  type:
                    kind: bits
                    n: 8
                  doc: Type of the header following this Routing header. [RFC 8200 §4.4]
                - id: hdrExtLen
                  name: Hdr Ext Len
                  type:
                    kind: bits
                    n: 8
                  doc: Length of this header in 8-byte units, not counting the first 8 bytes. [RFC 8200 §4.4]
                - id: routingType
                  name: Routing Type
                  type:
                    kind: bits
                    n: 8
                  doc: Identifies the routing-header variant and how Type-Specific Data is interpreted. [RFC 8200 §4.4]
                - id: segmentsLeft
                  name: Segments Left
                  type:
                    kind: bits
                    n: 8
                  doc: Number of intermediate nodes still to be visited before reaching the final destination. [RFC 8200 §4.4]
                - id: typeSpecific
                  name: Type-Specific Data
                  type:
                    kind: bits
                    n: 32
                  doc: Variable-length data whose format depends on the Routing Type. [RFC 8200 §4.4]
            "44":
              id: nextHeader_proto_44
              name: Fragment
              fields:
                - id: nextHeader
                  name: Next Header
                  type:
                    kind: bits
                    n: 8
                  doc: Type of the header that begins the fragmentable part carried in this fragment. [RFC 8200 §4.5]
                - id: reserved
                  name: Reserved
                  type:
                    kind: bits
                    n: 8
                  doc: Reserved field; initialized to zero by the sender and ignored on receipt. [RFC 8200 §4.5]
                - id: fragOffset
                  name: Frag Offset
                  type:
                    kind: bits
                    n: 13
                  doc: Offset of this fragment's payload, in 8-byte units, relative to the start of the fragmentable part of the original packet. [RFC 8200 §4.5]
                - id: res2
                  name: Res
                  type:
                    kind: bits
                    n: 2
                  doc: Reserved bits; initialized to zero by the sender and ignored on receipt. [RFC 8200 §4.5]
                - id: mFlag
                  name: M
                  type:
                    kind: bits
                    n: 1
                  doc: More Fragments flag — 1 if further fragments follow, 0 on the last fragment. [RFC 8200 §4.5]
                - id: ident
                  name: Identification
                  type:
                    kind: bits
                    n: 32
                  doc: Identifier shared by all fragments of one original packet so the destination can reassemble them. [RFC 8200 §4.5]
            "50":
              id: nextHeader_proto_50
              name: ESP
              fields:
                - id: spi
                  name: SPI
                  type:
                    kind: bits
                    n: 32
                  doc: Security Parameters Index — combined with the destination address it identifies the Security Association used to decrypt and verify this packet. [RFC 4303 §2.1]
                - id: seq
                  name: Sequence Number
                  type:
                    kind: bits
                    n: 32
                  doc: Monotonically increasing counter providing anti-replay protection for the Security Association. [RFC 4303 §2.2]
                - id: payload
                  name: Encrypted Payload (var)
                  type:
                    kind: bits
                    n: 64
                  doc: Variable-length encrypted payload data, including padding and the trailing Next Header field; shown here as a fixed-size placeholder. [RFC 4303 §2.3]
            "51":
              id: nextHeader_proto_51
              name: AH
              fields:
                - id: nextHeader
                  name: Next Header
                  type:
                    kind: bits
                    n: 8
                  doc: Type of the header following this Authentication Header. [RFC 4302 §2.1]
                - id: payloadLen
                  name: Payload Len
                  type:
                    kind: bits
                    n: 8
                  doc: Length of the Authentication Header in 4-byte units, minus 2. [RFC 4302 §2.2]
                - id: reserved
                  name: Reserved
                  type:
                    kind: bits
                    n: 16
                  doc: Reserved field; set to zero by the sender and ignored on receipt (but covered by the integrity check). [RFC 4302 §2.3]
                - id: spi
                  name: SPI
                  type:
                    kind: bits
                    n: 32
                  doc: Security Parameters Index — combined with the destination address it identifies the Security Association for this packet. [RFC 4302 §2.4]
                - id: seq
                  name: Sequence Number
                  type:
                    kind: bits
                    n: 32
                  doc: Monotonically increasing counter providing anti-replay protection for the Security Association. [RFC 4302 §2.5]
                - id: icv
                  name: Integrity Check Value
                  type:
                    kind: bits
                    n: 96
                  doc: Variable-length integrity check value (a truncated MAC) authenticating the packet; its length depends on the negotiated algorithm. [RFC 4302 §2.6]
            "60":
              id: nextHeader_proto_60
              name: Destination Options
              fields:
                - id: nextHeader
                  name: Next Header
                  type:
                    kind: bits
                    n: 8
                  doc: Type of the header following this Destination Options header. [RFC 8200 §4.6]
                - id: hdrExtLen
                  name: Hdr Ext Len
                  type:
                    kind: bits
                    n: 8
                  doc: Length of this header in 8-byte units, not counting the first 8 bytes. 0 means an 8-byte header. [RFC 8200 §4.6]
                - id: options
                  name: Options + padding
                  type:
                    kind: bits
                    n: 48
                  doc: One or more TLV-encoded options examined only by the packet's destination node(s), padded to an 8-byte boundary. [RFC 8200 §4.2, §4.6]
    count:
      kind: ref
      field: nextHeader_chainCount
