# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: OSPFv2 Link State Request Packet
rowBits: 32
byteOrder: BE
description: OSPFv2 Link State Request packet (RFC 2328 Appendix A.3.4, packet type 3). 24-byte OSPF common header followed by one or more 12-byte LS Request records. Link State Request packets are sent after the Database Exchange to obtain the full bodies of LSAs that were found to be more recent than the local copy; each record precisely identifies one LSA by its (LS Type, Link State ID, Advertising Router) triple.
body:
  - id: version
    name: Version
    type: { kind: int, bits: 8 }
    category: type
    defaultValue: 2
    doc: OSPF protocol version. Always 2 for OSPFv2 (OSPFv3 for IPv6 uses a separate packet format). [RFC 2328 §A.3.1]
  - id: packetType
    name: Type
    type: { kind: int, bits: 8 }
    category: type
    defaultValue: 3
    doc: OSPF packet type. 1=Hello, 2=Database Description, 3=Link State Request (this preset), 4=Link State Update, 5=Link State Acknowledgment. [RFC 2328 §A.3.1]
  - id: packetLength
    name: Packet Length
    type: { kind: int, bits: 16 }
    category: length
    doc: Length of the OSPF packet in bytes, including the 24-byte common header. For a Link State Request with N request records = 24 + 12 × N. [RFC 2328 §A.3.1]
  - id: routerId
    name: Router ID
    type: { kind: int, bits: 32 }
    category: identifier
    doc: 32-bit identifier of the originating router. Written in dotted-quad form like an IPv4 address; conventionally chosen as the largest IP address configured on the router, or a manually assigned value. Must be unique within the OSPF routing domain. [RFC 2328 §A.3.1]
  - id: areaId
    name: Area ID
    type: { kind: int, bits: 32 }
    category: identifier
    doc: 32-bit identifier of the OSPF area this packet belongs to. 0.0.0.0 is the backbone area. Link State Request packets are accepted only from neighbors within the same area. [RFC 2328 §A.3.1]
  - id: checksum
    name: Checksum
    type: { kind: int, bits: 16 }
    category: checksum
    doc: Standard IP checksum (one's complement of one's-complement 16-bit sum) over the entire OSPF packet excluding the 64-bit Authentication field. [RFC 2328 §A.3.1]
  - id: authType
    name: Authentication Type
    type: { kind: int, bits: 16 }
    category: type
    defaultValue: 0
    doc: Authentication scheme applied per-interface. 0=Null (no authentication), 1=Simple password, 2=Cryptographic (MD5/HMAC). [RFC 2328 §D.1]
    values:
      - { value: 0, name: NULL_AUTH, label: "Null authentication", level: may, meta: { rfc: 2328, section: "D.3" } }
      - { value: 1, name: SIMPLE, label: "Simple password", level: may, meta: { rfc: 2328, section: "D.3" } }
      - { value: 2, name: CRYPTOGRAPHIC, label: "Cryptographic authentication", level: may, meta: { rfc: 2328, section: "D.3" } }
  - id: authentication
    name: Authentication
    type: { kind: bits, n: 64 }
    category: identifier
    doc: 64-bit authentication payload whose meaning is set by Authentication Type. Null→zero; Simple→ASCII password padded with zeros; Cryptographic→2-byte reserved (0) || 1-byte Key ID || 1-byte Auth Data Length || 4-byte cryptographic sequence number, with the actual MAC appended after the packet. [RFC 2328 §D.3]
  - kind: bounded
    id: lsRequestsScope
    name: LS Request List
    bytes: { kind: op, op: "-", a: { kind: ref, field: packetLength }, b: { kind: lit, value: 24 } }
    doc: "Length-delimited region holding the LS Request records. Its byte budget is the Packet Length minus the 24-byte OSPF common header; the list carries no explicit element count, so the bounded scope confines the `count: eos` repeat to exactly these octets (each record is a fixed 12 bytes). [RFC 2328 §A.3.4]"
    fields:
      - kind: repeat
        id: lsRequests
        name: LS Request List
        category: variable
        doc: Zero or more 12-byte LS Request records identifying LSAs whose full bodies are being requested. After the Database Exchange phase, a router builds this list from LSAs whose headers were seen in the neighbor's Database Description packets but whose local copies are absent or stale. [RFC 2328 §A.3.4]
        count: eos
        element:
          id: lsRequestRecord
          fields:
            - id: lsType
              name: LS Type
              type: { kind: int, bits: 32 }
              category: type
              doc: LSA type being requested. 1=Router-LSA, 2=Network-LSA, 3=Summary-LSA (IP network), 4=Summary-LSA (ASBR), 5=AS-external-LSA. Encoded as a 32-bit field in the request (unlike the 8-bit field in the LSA header). [RFC 2328 §A.3.4]
              values:
                - { value: 1, name: ROUTER_LSA, label: "Router-LSA", level: must, meta: { rfc: 2328, section: "A.4.2" } }
                - { value: 2, name: NETWORK_LSA, label: "Network-LSA", level: must, meta: { rfc: 2328, section: "A.4.3" } }
                - { value: 3, name: SUMMARY_LSA_IP, label: "Summary-LSA (IP network)", level: must, meta: { rfc: 2328, section: "A.4.4" } }
                - { value: 4, name: SUMMARY_LSA_ASBR, label: "Summary-LSA (ASBR)", level: must, meta: { rfc: 2328, section: "A.4.4" } }
                - { value: 5, name: AS_EXTERNAL_LSA, label: "AS-external-LSA", level: must, meta: { rfc: 2328, section: "A.4.5" } }
            - id: linkStateId
              name: Link State ID
              type: { kind: int, bits: 32 }
              category: identifier
              doc: Identifies the portion of the routing domain being described by the requested LSA. Its exact meaning depends on the LS Type (e.g. Router ID for Router-LSAs, IP network number for Network-LSAs and Summary-LSAs). [RFC 2328 §A.3.4]
            - id: advertisingRouter
              name: Advertising Router
              type: { kind: int, bits: 32 }
              category: identifier
              doc: Router ID of the router that originated the requested LSA (dotted-quad on the wire). Together with LS Type and Link State ID, uniquely identifies the LSA within the OSPF domain. [RFC 2328 §A.3.4]
