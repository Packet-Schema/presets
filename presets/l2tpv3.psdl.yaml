# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: L2TPv3 Data Message (over IP)
rowBits: 32
byteOrder: BE
description: "L2TP version 3 data message encapsulated directly over IP (Protocol 115, RFC 3931). L2TPv3 replaces the 16-bit Tunnel ID + Session ID pair of L2TPv2 (RFC 2661) with a single 32-bit Session ID in the data-plane header, eliminating the framing overhead of the control word and enabling pseudowire (PW) services — Ethernet, Frame Relay, ATM, HDLC — over an IP or UDP/IP network. The minimal data-plane header is 32 bits: a 32-bit Session ID. An optional 64-bit Cookie (two 32-bit halves, CookieHigh and CookieLow) follows when negotiated via the control channel; the Cookie provides a lightweight spoofing-resistance check independent of any IP-layer security. An optional L2-Specific Sublayer of 32 bits MAY follow the Cookie (or Session ID when no Cookie is present) to carry the Default L2-Specific Sublayer (sequence number + reserved bits) per RFC 4719. The encapsulated L2 payload follows and runs to the end of the IP datagram. Critically, RFC 3931 §4.1 states that the Session ID alone provides the context for all further processing, including the presence and size of the Cookie and the presence of the L2-Specific Sublayer: none of these is signalled by any bit or field in the data packet itself. They are therefore modelled here as zero-width virtual fields (cookieLength and sublayerPresent) carrying the session-negotiated values, with CookieHigh/CookieLow and the L2-Specific Sublayer made conditional on them. [RFC 3931 §4.1 / §4.1.2]"
meta:
  family: l2tp
  tags: [link-layer, tunnel, encapsulation]

body:
  - id: sessionId
    name: Session ID
    type: { kind: int, bits: 32 }
    category: identifier
    doc: "32-bit session identifier allocated by the local LAC/LNS for the pseudowire session. Unlike L2TPv2, there is no Tunnel ID in the data-plane header; the Session ID alone demultiplexes incoming data messages to the correct pseudowire. A value of 0 is reserved for L2TP control messages; a data-plane packet MUST NOT carry Session ID 0 on the wire. [RFC 3931 §4.1 / §3.3]"

  - kind: virtual
    id: cookieLength
    name: Cookie Length (session-determined)
    expr: { kind: lit, value: 0 }
    doc: "Cookie byte length for this session: 0 (no Cookie), 4, or 8. This value is NOT carried on the L2TPv3 wire — RFC 3931 §4.1 makes the Session ID the sole context for the presence and size of the Cookie, which is negotiated out-of-band by the Assigned Cookie AVP during session establishment. Modelled here as a zero-width virtual field (default 0 = no Cookie; a decoder seeds the session-negotiated 4 or 8) so the Cookie halves below can be made conditional on it. [RFC 3931 §4.1.2 / §5.4.3]"

  - kind: optional
    when: { kind: op, op: ">=", a: { kind: ref, field: cookieLength }, b: { kind: lit, value: 4 } }
    container:
      id: cookieHigh
      name: Cookie (High 32)
      type: { kind: int, bits: 32 }
      category: variable
      doc: "Upper 32 bits of the 64-bit Cookie, present when a Cookie of 4 or 8 bytes was negotiated (cookieLength >= 4). The Cookie is an opaque value chosen by the session originator to provide protection against off-path Session ID spoofing; receivers MUST silently discard packets whose Cookie does not match the negotiated value. When a 4-byte Cookie is used only CookieHigh carries the value and CookieLow is absent. [RFC 3931 §4.1.2]"

  - kind: optional
    when: { kind: op, op: "==", a: { kind: ref, field: cookieLength }, b: { kind: lit, value: 8 } }
    container:
      id: cookieLow
      name: Cookie (Low 32)
      type: { kind: int, bits: 32 }
      category: variable
      doc: "Lower 32 bits of the 64-bit Cookie, present only when an 8-byte Cookie was negotiated (cookieLength == 8). Together with CookieHigh this forms the full 8-byte Cookie value that the receiver compares against the locally stored cookie for the session. If only a 4-byte Cookie was negotiated this field is absent. [RFC 3931 §4.1.2]"

  - kind: virtual
    id: sublayerPresent
    name: L2-Specific Sublayer present (session-determined)
    expr: { kind: lit, value: 0 }
    doc: "Decode-time predicate (0 wire bytes): non-zero when a Default L2-Specific Sublayer was negotiated for this session via the L2-Specific Sublayer Type AVP. Like the Cookie length this is not signalled in the data packet (RFC 3931 §4.1) — it is derived from the Session ID context. Default 0 = no sublayer; a decoder seeds 1 when the session uses the Default L2-Specific Sublayer. [RFC 3931 §4.6 / §5.4.4]"

  - kind: optional
    when: { kind: ref, field: sublayerPresent }
    container:
      id: l2Sublayer
      name: L2-Specific Sublayer
      type: { kind: int, bits: 32 }
      category: variable
      doc: "32-bit Default L2-Specific Sublayer, present when negotiated via the L2-Specific Sublayer AVP. Bit layout (MSB first): 1 reserved bit, 1-bit S (Sequence) flag, 6 reserved bits, then a 24-bit Sequence Number (a free-running counter of 2^24 values). The sequence number provides per-session in-order delivery detection for pseudowire payloads; a value of 0 in the S flag indicates the sequence number field is not valid. When no L2-Specific Sublayer type was negotiated this field is absent. [RFC 3931 §4.6 / RFC 4719 §2.1]"

  - id: l2Payload
    name: L2 Payload
    type: { kind: bytes, n: { kind: remaining } }
    category: variable
    doc: "Encapsulated Layer-2 payload for the pseudowire. Content depends on the PW Type negotiated via the Pseudowire Type AVP: 0x0004 Ethernet Tagged Mode (RFC 4448), 0x0005 Ethernet (untagged, RFC 4448), 0x0001 Frame Relay DLCI (RFC 4619), 0x0002 ATM AAL5 SDU (RFC 4454), 0x0006 HDLC (RFC 4618), among others. The length is not carried in the L2TPv3 data-plane header; the payload runs to the end of the enclosing IP datagram, so it consumes all bytes remaining in the top-level scope (the decoder injects the total packet length from the IP layer). [RFC 3931 §4.1 / RFC 4446]"
