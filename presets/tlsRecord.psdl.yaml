# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: TLS Record Layer
rowBits: 8
byteOrder: BE
description: TLS record layer header (RFC 8446 §5.1). 5-byte fixed header that frames every TLS record on the wire — a 1-byte ContentType, a 2-byte legacy_record_version, and a 2-byte big-endian fragment length.
meta:
  rfc: { defined: 8446, updates: [{ rfc: 5246, section: "6.2.1" }] }
  section: "5.1"
  family: tls
  tags: [application, tcp-based, framing, security, data-transfer]
body:
  - id: type
    name: Content Type
    type:
      kind: enum
      bits: 8
      variants:
        20: "ChangeCipherSpec"
        21: "Alert"
        22: "Handshake"
        23: "ApplicationData"
        24: "Heartbeat"
    category: type
    doc: What kind of record this carries — drives demultiplexing inside the TLS stack. 20=ChangeCipherSpec, 21=Alert, 22=Handshake (ClientHello/ServerHello/...), 23=ApplicationData (encrypted application traffic), 24=Heartbeat (RFC 6520). Value 0 (invalid) MUST NOT appear on the wire. [RFC 8446 §5.1]
  - id: version
    name: Legacy Record Version
    type:
      kind: int
      bits: 16
    category: type
    doc: Legacy record-version (ProtocolVersion). Frozen at 0x0301 (TLS 1.0) for the initial ClientHello and 0x0303 (TLS 1.2) thereafter, regardless of the version actually negotiated — TLS 1.3 keeps sending 0x0303 here so middleboxes that hard-code TLS 1.2 do not drop the record. The real negotiated version lives in the Handshake messages. [RFC 8446 §5.1]
  - id: length
    name: Length
    type:
      kind: int
      bits: 16
    category: length
    doc: 16-bit big-endian length of the protected/plaintext fragment that follows this header, in bytes. A TLSCiphertext fragment MUST NOT exceed 2^14 + 256 bytes; a TLSPlaintext fragment MUST NOT exceed 2^14 bytes. [RFC 8446 §5.1]
  - id: fragment
    name: Fragment
    type:
      kind: bytes
      n:
        kind: ref
        field: length
    category: payload-marker
    doc: The record payload — encrypted (TLSCiphertext) once keys are established, otherwise plaintext (TLSPlaintext). Its interpretation depends on the Content Type. Byte length is given by Length. [RFC 8446 §5.1]
