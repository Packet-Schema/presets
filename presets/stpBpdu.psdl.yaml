# yaml-language-server: $schema=../../schemas/psdl.schema.json
name: STP Configuration BPDU
rowBits: 32
byteOrder: Network byte order (big-endian, MSB-first). Bridge / Root Identifier are 8 bytes formed by 2-byte priority || 6-byte MAC. Time fields are encoded in units of 1/256 second.
description: Spanning Tree Protocol Configuration BPDU (IEEE 802.1D-1998). Total 35 bytes, carried over 802.2 LLC (DSAP/SSAP = 0x42) above an 802.3 frame to the multicast address 01:80:C2:00:00:00. RSTP (Version=2) extends this with Version 1 Length and overloads the Flags byte — modelled separately to keep the legacy STP layout readable.
body:
  - id: protocolId
    name: Protocol Identifier
    type: { kind: int, bits: 16 }
    category: type
    defaultValue: 0
    doc: Always 0x0000 for all spanning tree BPDUs — distinguishes the spanning tree protocol from other 802.2 LLC payloads. [IEEE 802.1D §9.3.1]
  - id: protocolVersion
    name: Protocol Version
    type: { kind: int, bits: 8 }
    category: type
    defaultValue: 0
    doc: 0 = legacy STP (this preset), 2 = RSTP (RST BPDU), 3 = MSTP. Receivers MUST tolerate higher version values for forward compatibility. [IEEE 802.1D §9.3.2]
  - id: bpduType
    name: BPDU Type
    type: { kind: int, bits: 8 }
    category: type
    defaultValue: 0
    doc: 0x00 = Configuration BPDU (this preset), 0x80 = Topology Change Notification BPDU, 0x02 = RST/MST BPDU. [IEEE 802.1D §9.3.3]
  - kind: group
    id: flagsBits
    name: Flags
    children:
      - id: flags_tca
        name: TCA
        type: { kind: bits, n: 1 }
        category: flags
        doc: Topology Change Acknowledgment — set in a Configuration BPDU sent in response to a TCN BPDU, to acknowledge receipt. [IEEE 802.1D §9.3.4]
      - id: flags_reserved
        name: Rsvd
        type: { kind: bits, n: 6 }
        category: reserved
        doc: Reserved in legacy STP — transmitted as zero, ignored on receipt. RSTP overloads these bits for Proposal / Port Role / Learning / Forwarding / Agreement (see RSTP BPDU). [IEEE 802.1D-1998]
      - id: flags_tc
        name: TC
        type: { kind: bits, n: 1 }
        category: flags
        doc: Topology Change — set by the root bridge while the network is reconverging after a topology event, causing bridges to age out their filtering databases quickly. [IEEE 802.1D §9.3.4]
  - kind: group
    id: rootIdentifier
    name: Root Identifier
    children:
      - id: rootPriority
        name: Root Priority
        type: { kind: int, bits: 16 }
        category: identifier
        defaultValue: 32768
        doc: Bridge Priority of the root bridge. 16-bit unsigned, lower value wins. Default 32768. Since 802.1Q-2003 the lower 12 bits are reinterpreted as a VLAN-based System ID Extension (priority becomes 4 bits, granularity 4096), but this preset shows the original 802.1D-1998 layout. [IEEE 802.1D §9.2.5]
      - id: rootMac
        name: Root MAC Address
        type: { kind: bits, n: 48 }
        category: addressing
        doc: 48-bit IEEE EUI-48 of the root bridge. Combined with Root Priority forms the unique 64-bit Root Identifier used in the spanning tree election. [IEEE 802.1D §9.2.5]
  - id: rootPathCost
    name: Root Path Cost
    type: { kind: int, bits: 32 }
    category: length
    doc: Cumulative cost to reach the root, summed over the path's egress port costs. The receiving bridge adds its own ingress port cost before comparing against its current best. 32-bit unsigned (RSTP); legacy STP used 16-bit costs scaled to 1/65536 of the link bandwidth. [IEEE 802.1D §17.14]
  - kind: group
    id: bridgeIdentifier
    name: Bridge Identifier
    children:
      - id: bridgePriority
        name: Bridge Priority
        type: { kind: int, bits: 16 }
        category: identifier
        defaultValue: 32768
        doc: Bridge Priority of the bridge transmitting this BPDU. Same encoding rules as Root Priority. [IEEE 802.1D §9.2.5]
      - id: bridgeMac
        name: Bridge MAC Address
        type: { kind: bits, n: 48 }
        category: addressing
        doc: 48-bit MAC address of the transmitting bridge. Combined with Bridge Priority forms the 64-bit Bridge Identifier used in the root election. [IEEE 802.1D §9.2.5]
  - id: portId
    name: Port Identifier
    type: { kind: int, bits: 16 }
    category: identifier
    doc: Identifier of the port that transmitted this BPDU. Top 4 bits = Port Priority (default 0x8 = 128), bottom 12 bits = Port Number. Used as a tiebreaker in the spanning tree election. [IEEE 802.1D §17.18]
  - id: messageAge
    name: Message Age
    type: { kind: int, bits: 16 }
    category: identifier
    doc: Age of this BPDU since it was generated by the root, in units of 1/256 second. Each bridge that forwards the BPDU increments this by at least 1. Compared against Max Age to detect stale information. [IEEE 802.1D §17.19]
  - id: maxAge
    name: Max Age
    type: { kind: int, bits: 16 }
    category: identifier
    defaultValue: 5120
    doc: Maximum lifetime of cached spanning tree information before it is discarded, in units of 1/256 second. Default 20 s (5120 / 256). Bridges adopt the Max Age advertised by the root. [IEEE 802.1D §17.19]
  - id: helloTime
    name: Hello Time
    type: { kind: int, bits: 16 }
    category: identifier
    defaultValue: 512
    doc: Interval between Configuration BPDUs sent by the root, in units of 1/256 second. Default 2 s (512 / 256). Determines how quickly bridges notice that the root has stopped. [IEEE 802.1D §17.19]
  - id: forwardDelay
    name: Forward Delay
    type: { kind: int, bits: 16 }
    category: identifier
    defaultValue: 3840
    doc: Time a port spends in Listening and Learning states before transitioning to Forwarding, in units of 1/256 second. Default 15 s (3840 / 256). Prevents transient loops during reconvergence. [IEEE 802.1D §17.19]
