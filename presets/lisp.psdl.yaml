# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: LISP Data Header
rowBits: 32
byteOrder: BE
description: "Locator/ID Separation Protocol (LISP) data-plane encapsulation header (RFC 6830). An 8-byte fixed header prepended to an inner IP packet inside a UDP datagram (destination port 4341). The header carries five single-bit flags — N (Nonce Present), L (Locator-Status-Bits present), E (Echo-Nonce request), V (Map-Version present), I (Instance ID present) — followed by three reserved flag bits, a 24-bit Nonce-or-Map-Version field, and a 32-bit Instance-ID-or-LSB field. When N=1 the 24-bit field is a nonce; when V=1 it carries source and destination map-version numbers (12 bits each). When I=1 the upper 24 bits of the second word are an Instance ID (VPN/tenant identifier) and the lower 8 bits carry Locator-Status-Bits; when I=0 and L=1 the lower 8 bits still carry Locator-Status-Bits. N and V are mutually exclusive (MUST NOT both be 1). The inner IP header immediately follows the 8-byte LISP header."

body:
  - kind: group
    id: lispFlags
    name: Flags
    children:
      - id: lispN
        name: N
        type: { kind: int, bits: 1 }
        category: flags
        defaultValue: 0
        doc: "Nonce Present (N) flag. When set to 1, the 24-bit Nonce/Map-Version field contains a nonce value generated by the ITR for liveness detection and path verification. N and V MUST NOT both be 1 in the same packet. [RFC 6830 §5.3]"
      - id: lispL
        name: L
        type: { kind: int, bits: 1 }
        category: flags
        defaultValue: 0
        doc: "Locator-Status-Bits (L) flag. When set to 1, the least-significant 8 bits of the second 32-bit word carry Locator-Status-Bits encoding the up/down state of the source locators. When I=1 those bits occupy the LSB of the Instance ID word. [RFC 6830 §5.3]"
      - id: lispE
        name: E
        type: { kind: int, bits: 1 }
        category: flags
        defaultValue: 0
        doc: "Echo-Nonce Request (E) flag. Set to 1 to request that the ETR echo the nonce in the Nonce field back to the ITR so that the ITR can verify the path is active. Meaningful only when N=1. [RFC 6830 §5.3]"
      - id: lispV
        name: V
        type: { kind: int, bits: 1 }
        category: flags
        defaultValue: 0
        doc: "Map-Version Present (V) flag. When set to 1, the 24-bit Nonce/Map-Version field is split into two 12-bit map-version numbers: the upper 12 bits are the source EID-prefix map-version and the lower 12 bits are the destination EID-prefix map-version. N and V MUST NOT both be 1. [RFC 6830 §5.3]"
      - id: lispI
        name: I
        type: { kind: int, bits: 1 }
        category: flags
        defaultValue: 0
        doc: "Instance ID (I) flag. When set to 1, the upper 24 bits of the second 32-bit word carry an Instance ID that identifies the LISP VPN/tenant context, and the lower 8 bits carry Locator-Status-Bits (if L=1). When I=0 the entire second word is used for Locator-Status-Bits or nonce LSBs as indicated by the other flags. [RFC 6830 §5.3]"
      - id: lispFlagsRsvd
        name: Flags (reserved)
        type: { kind: bits, n: 3 }
        category: reserved
        doc: "Three reserved flag bits. MUST be set to zero by the ITR and ignored by the ETR. [RFC 6830 §5.3]"

  - kind: switch
    id: byLispNV
    on: { kind: ref, field: lispN }
    cases:
      "1":
        id: lispNonceWord
        doc: "Nonce"
        fields:
          - id: lispNonce
            name: Nonce
            type: { kind: int, bits: 24 }
            category: identifier
            doc: "24-bit nonce generated by the ITR. The ETR reflects this value back in a LISP-encapsulated reply when E=1, enabling the ITR to confirm that the data path is alive. Value has no semantic meaning to the ETR beyond echo. [RFC 6830 §5.3]"
      "_":
        id: lispMapVersionWord
        doc: "Map-Version / Reserved"
        fields:
          - kind: switch
            id: byLispV
            on: { kind: ref, field: lispV }
            cases:
              "1":
                id: lispMapVersionFields
                doc: "Map-Version Fields"
                fields:
                  - id: lispSrcMapVersion
                    name: Source Map-Version
                    type: { kind: int, bits: 12 }
                    category: identifier
                    doc: "12-bit map-version number of the source EID-prefix mapping known to the ITR. The ETR can compare this against its own copy to detect stale mappings. Present only when V=1. [RFC 6830 §5.3]"
                  - id: lispDstMapVersion
                    name: Dest Map-Version
                    type: { kind: int, bits: 12 }
                    category: identifier
                    doc: "12-bit map-version number of the destination EID-prefix mapping known to the ITR. The ETR can compare this against its own copy to detect stale mappings. Present only when V=1. [RFC 6830 §5.3]"
              "_":
                id: lispNonceRsvd
                doc: "Nonce/Map-Version (unused)"
                fields:
                  - id: lispRsvd24
                    name: Reserved (24 bit)
                    type: { kind: bits, n: 24 }
                    category: reserved
                    doc: "24-bit field unused when N=0 and V=0. MUST be set to zero by the ITR and ignored by the ETR. [RFC 6830 §5.3]"

  - kind: switch
    id: byLispI
    on: { kind: ref, field: lispI }
    cases:
      "1":
        id: lispInstanceWord
        doc: "Instance ID + LSB"
        fields:
          - id: lispInstanceId
            name: Instance ID
            type: { kind: int, bits: 24 }
            category: identifier
            doc: "24-bit Instance ID identifying the LISP VPN or tenant context. Used to multiplex multiple routing instances over a single underlay. The ETR uses this value to forward the inner packet into the correct virtual routing and forwarding (VRF) table. Present only when I=1. [RFC 6830 §5.3]"
          - id: lispLSB
            name: Locator-Status-Bits
            type: { kind: int, bits: 8 }
            category: flags
            doc: "8-bit Locator-Status-Bits indicating the up/down reachability status of each source RLOC in the order they appear in the source Map-Reply. Bit 0 is the status of the first RLOC. Meaningful only when L=1; otherwise set to zero. Present in the LSB position of the Instance ID word when I=1. [RFC 6830 §5.3]"
      "_":
        id: lispLSBOnly
        doc: "Locator-Status-Bits / Reserved"
        fields:
          - id: lispRsvd24b
            name: Reserved (24 bit)
            type: { kind: bits, n: 24 }
            category: reserved
            doc: "Upper 24 bits of the second word when I=0. MUST be set to zero and ignored by the ETR. [RFC 6830 §5.3]"
          - id: lispLSBNoInstance
            name: Locator-Status-Bits
            type: { kind: int, bits: 8 }
            category: flags
            doc: "8-bit Locator-Status-Bits indicating the up/down reachability status of each source RLOC when I=0 and L=1. Bit 0 corresponds to the first RLOC listed in the source Map-Reply. Set to zero when L=0. [RFC 6830 §5.3]"
