              id: nsOption
              fields:
                - kind: switch
                  id: nsByOptType
                  on: { kind: peek, bits: 8 }
                  cases:
                    "1":
                      id: ndpOptSourceLinkAddr
                      doc: Source Link-Layer Address
                      fields:
                        - { id: ndpOptType, name: Type, type: { kind: int, bits: 8 }, category: type, defaultValue: 1, doc: "NDP option type 1 = Source Link-Layer Address — the link-layer (e.g. Ethernet MAC) address of the sender. Included in Router/Neighbor Solicitations and Router Advertisements so the receiver can reply without a separate resolution step. [RFC 4861 §4.6.1]" }
                        - { id: ndpOptLength, name: Length, type: { kind: int, bits: 8 }, category: length, defaultValue: 1, doc: "Option length in units of 8 octets, including the Type and Length bytes. For an Ethernet (48-bit) address this is 1 (8 octets total). A value of 0 is invalid and the option MUST be silently discarded. [RFC 4861 §4.6]" }
                        - { id: ndpLinkAddr, name: Link-Layer Address, type: { kind: bits, n: 48 }, category: addressing, doc: "Sender's link-layer address. Shown here as a 48-bit Ethernet MAC, the common case; the field length is media-dependent and padded so the whole option is a multiple of 8 octets. [RFC 4861 §4.6.1]" }
                    "2":
                      id: ndpOptTargetLinkAddr
                      doc: Target Link-Layer Address
                      fields:
                        - { id: ndpOptType, name: Type, type: { kind: int, bits: 8 }, category: type, defaultValue: 2, doc: "NDP option type 2 = Target Link-Layer Address — the link-layer address of the target being advertised. Included in Neighbor Advertisements and Redirects so the receiver learns the target's MAC without further resolution. [RFC 4861 §4.6.1]" }
                        - { id: ndpOptLength, name: Length, type: { kind: int, bits: 8 }, category: length, defaultValue: 1, doc: "Option length in units of 8 octets, including the Type and Length bytes. For an Ethernet (48-bit) address this is 1 (8 octets total). [RFC 4861 §4.6]" }
                        - { id: ndpLinkAddr, name: Link-Layer Address, type: { kind: bits, n: 48 }, category: addressing, doc: "Target's link-layer address, shown as a 48-bit Ethernet MAC (the common case); media-dependent and padded to an 8-octet multiple. [RFC 4861 §4.6.1]" }
                    "3":
                      id: ndpOptPrefixInfo
                      doc: Prefix Information
                      fields:
                        - { id: ndpOptType, name: Type, type: { kind: int, bits: 8 }, category: type, defaultValue: 3, doc: "NDP option type 3 = Prefix Information — appears only in Router Advertisements; supplies on-link and address-autoconfiguration prefixes for the link. [RFC 4861 §4.6.2]" }
                        - { id: ndpOptLength, name: Length, type: { kind: int, bits: 8 }, category: length, defaultValue: 4, doc: "Option length in units of 8 octets, including the Type and Length bytes. Always 4 (32 octets total) for Prefix Information. [RFC 4861 §4.6.2]" }
                        - { id: ndpPrefixLength, name: Prefix Length, type: { kind: int, bits: 8 }, category: length, doc: "Number of leading bits of the Prefix that are valid (0..128). The same prefix may be used for on-link determination and/or stateless address autoconfiguration. [RFC 4861 §4.6.2]" }
                        - kind: group
                          id: ndpPrefixFlags
                          name: Flags / Reserved
                          children:
                            - { id: ndpPrefixL, name: L, type: { kind: bits, n: 1 }, category: flags, doc: "On-link flag. When set, the prefix can be used for on-link determination — destinations matching it are reachable directly on the link. [RFC 4861 §4.6.2]" }
                            - { id: ndpPrefixA, name: A, type: { kind: bits, n: 1 }, category: flags, doc: "Autonomous address-configuration flag. When set, the prefix can be used for stateless address autoconfiguration (SLAAC, RFC 4862). [RFC 4861 §4.6.2]" }
                            - { id: ndpPrefixRsv6, name: Reserved1, type: { kind: bits, n: 6 }, category: reserved, doc: "Reserved (6 bits). Sent as zero by the sender and ignored by the receiver. [RFC 4861 §4.6.2]" }
                        - { id: ndpValidLifetime, name: Valid Lifetime, type: { kind: int, bits: 32 }, category: variable, doc: "Length of time in seconds (relative to the packet's reception) that the prefix is valid for on-link determination. 0xFFFFFFFF represents infinity. [RFC 4861 §4.6.2]" }
                        - { id: ndpPreferredLifetime, name: Preferred Lifetime, type: { kind: int, bits: 32 }, category: variable, doc: "Length of time in seconds that addresses generated from the prefix via SLAAC remain preferred. 0xFFFFFFFF represents infinity; must not exceed the Valid Lifetime. [RFC 4861 §4.6.2]" }
                        - { id: ndpPrefixRsv32, name: Reserved2, type: { kind: bits, n: 32 }, category: reserved, doc: "Reserved (32 bits). Sent as zero by the sender and ignored by the receiver. [RFC 4861 §4.6.2]" }
                        - { id: ndpPrefix, name: Prefix, type: { kind: bits, n: 128 }, category: addressing, doc: "An IPv6 address or prefix; only the leading Prefix Length bits are significant, the remainder are zero. The link-local prefix MUST NOT be advertised here. [RFC 4861 §4.6.2]" }
                    "5":
                      id: ndpOptMtu
                      doc: MTU
                      fields:
                        - { id: ndpOptType, name: Type, type: { kind: int, bits: 8 }, category: type, defaultValue: 5, doc: "NDP option type 5 = MTU — appears in Router Advertisements to communicate a recommended link MTU, useful on links (e.g. some non-broadcast media) whose MTU is otherwise unknown or inconsistent. [RFC 4861 §4.6.4]" }
                        - { id: ndpOptLength, name: Length, type: { kind: int, bits: 8 }, category: length, defaultValue: 1, doc: "Option length in units of 8 octets, including the Type and Length bytes. Always 1 (8 octets total) for the MTU option. [RFC 4861 §4.6.4]" }
                        - { id: ndpMtuRsv, name: Reserved, type: { kind: bits, n: 16 }, category: reserved, doc: "Reserved (16 bits). Sent as zero by the sender and ignored by the receiver. [RFC 4861 §4.6.4]" }
                        - { id: ndpMtu, name: MTU, type: { kind: int, bits: 32 }, category: length, doc: "Recommended Maximum Transmission Unit for the link, in octets. Hosts SHOULD use this value provided it is not larger than the MTU they would otherwise use. [RFC 4861 §4.6.4]" }
