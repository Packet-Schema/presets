                        - { id: ndpOptLength, name: Length, type: { kind: int, bits: 8 }, category: length, doc: "Option length in units of 8 octets (including the 2-byte Type+Length header); the Value below is ndpOptLength*8 - 2 octets. [RFC 4861 §4.6]" }
                        - { id: ndpOptValue, name: Value, type: { kind: bytes, n: { kind: op, op: "-", a: { kind: op, op: "*", a: { kind: ref, field: ndpOptLength }, b: { kind: lit, value: 8 } }, b: { kind: lit, value: 2 } } }, category: variable, doc: "Opaque body of an NDP option whose Type is not modelled here; ndpOptLength*8 - 2 octets. [RFC 4861 §4.6]" }
            count: eos
