# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: Babel Routing Protocol
rowBits: 32
byteOrder: BE
meta:
  rfc: 8966
  aliases: [babel]
description: "Babel distance-vector routing protocol packet (RFC 8966). Every Babel packet starts with a 4-byte fixed header — Magic (0x42), Version (2), Body Length — followed by a sequence of Type-Length-Value (TLV) records that carry all routing information. Common TLV types: 0=Pad1, 1=PadN, 2=Acknowledgement Request, 3=Acknowledgement, 4=Hello, 5=IHU (I Heard You), 6=Router-Id, 7=Next-Hop, 8=Update, 9=Route Request, 10=Seqno Request. Babel operates over UDP (port 6696) and supports both IPv4 and IPv6. The PSDL model shows the fixed header plus a bounded body of TLV records that runs for exactly Body Length octets. Pad1 (Type=0) is a single octet with no Length or Value; every other TLV is Type + Length + Value, where the Value field is an opaque byte string whose length is given by the TLV Length field."

body:
  - kind: group
    id: babelHeader
    name: Babel Fixed Header
    children:
      - id: babelMagic
        name: Magic
        type: { kind: int, bits: 8 }
        category: identifier
        defaultValue: 66
        doc: "Magic number 0x42 (decimal 66, ASCII 'B'). A receiver MUST silently discard any packet whose Magic field is not 0x42. [RFC 8966 §4.2]"
      - id: babelVersion
        name: Version
        type: { kind: int, bits: 8 }
        category: type
        defaultValue: 2
        doc: "Babel protocol version. MUST be 2 for this specification; a packet with any other version MUST be silently ignored by a conforming implementation. [RFC 8966 §4.2]"
      - id: babelBodyLength
        name: Body Length
        type: { kind: int, bits: 16 }
        category: length
        doc: "Length of the packet body in bytes, i.e. the total number of bytes that follow this 4-byte fixed header. The Body Length does NOT include the header itself. A receiver MUST ignore any bytes that extend beyond the Body Length. [RFC 8966 §4.2]"

  - kind: bounded
    id: babelBody
    name: Babel Packet Body
    bytes: { kind: ref, field: babelBodyLength }
    doc: "The packet body is a sequence of TLVs whose total extent in octets is given by the Body Length field of the fixed header. A parser consumes TLVs until exactly Body Length bytes have been read; there is no TLV count field. [RFC 8966 §4.2]"
    fields:
      - kind: repeat
        id: babelTlvs
        name: TLV List
        category: variable
        element:
          id: babelTlv
          fields:
            - id: babelTlvType
              name: Type
              type:
                kind: enum
                bits: 8
                variants:
                  0: "Pad1"
                  1: "PadN"
                  2: "Acknowledgment Request"
                  3: "Acknowledgment"
                  4: "Hello"
                  5: "IHU (I Heard You)"
                  6: "Router-Id"
                  7: "Next-Hop"
                  8: "Update"
                  9: "Route Request"
                  10: "Seqno Request"
              category: type
              doc: "TLV type code. 0=Pad1 (single-byte, no Length/Value fields), 1=PadN (padding), 2=Acknowledgment Request, 3=Acknowledgment, 4=Hello (link liveness), 5=IHU (reception report toward a neighbour), 6=Router-Id (64-bit router identifier), 7=Next-Hop (next-hop address for subsequent Updates), 8=Update (route announcement), 9=Route Request (request for a specific or full table dump), 10=Seqno Request (request for a specific sequence number). Values 11–255 are reserved or defined by extensions. [RFC 8966 §4.3 / §4.4 / §4.5 / §4.6]"
            - kind: switch
              id: babelTlvBody
              name: TLV Body
              on: { kind: ref, field: babelTlvType }
              doc: "Pad1 (Type=0) is a single octet with no Length or Value; every other TLV is followed by a 1-byte Length and a Value of that many octets. [RFC 8966 §4.3]"
              cases:
                "0":
                  id: babelTlvPad1
                  doc: "Pad1 TLV (Type=0): a single octet with no Length and no Value. [RFC 8966 §4.3]"
                  fields: []
                "_":
                  id: babelTlvGeneric
                  fields:
                    - id: babelTlvLen
                      name: Length
                      type: { kind: int, bits: 8 }
                      category: length
                      doc: "Length of the TLV Value field in bytes, not including the Type and Length bytes themselves. For PadN (Type=1) the Length MUST be at least 0. Receivers MUST skip TLVs with unrecognised Type values using this field to advance past the Value. [RFC 8966 §4.3]"
                    - id: babelTlvValue
                      name: Value
                      type: { kind: bytes, n: { kind: ref, field: babelTlvLen } }
                      category: variable
                      doc: "TLV Value, exactly babelTlvLen bytes. Interpretation depends on Type. Hello (4): 2-byte flags + 2-byte Seqno + 2-byte Interval (centiseconds). IHU (5): 1-byte AE + 1-byte reserved + 2-byte Rxcost + 2-byte Interval + variable-length address. Router-Id (6): 2-byte reserved + 8-byte router identifier. Next-Hop (7): 1-byte AE + 1-byte reserved + variable-length next-hop address. Update (8): 1-byte AE + 1-byte flags + 1-byte Plen + 1-byte Omitted + 2-byte Interval + 2-byte Seqno + 2-byte Metric + variable-length Prefix. Route Request (9): 1-byte AE + 1-byte Plen + variable-length Prefix. Seqno Request (10): 1-byte AE + 1-byte Plen + 2-byte Seqno + 1-byte HopCount + 1-byte reserved + 8-byte Router-Id + variable-length Prefix. [RFC 8966 §4.4 / §4.5 / §4.6]"
        count: eos
