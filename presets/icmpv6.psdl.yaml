# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: ICMPv6 Echo
rowBits: 32
byteOrder: BE
description: ICMP for IPv6 echo request/reply layout (RFC 4443). Carried in IPv6 with Next Header=58. The Identifier and Sequence Number are 16-bit big-endian.
body:
  - id: type
    name: Type
    type:
      kind: enum
      bits: 8
      variants:
        1:
          label: Destination Unreachable
          doc: Datagram could not be delivered; Code refines the reason. [RFC 4443 §3.1]
        3:
          label: Time Exceeded
          doc: Hop Limit reached 0 or fragment reassembly timed out. [RFC 4443 §3.3]
        128:
          label: Echo Request
          doc: Echo Request (ping); elicits an Echo Reply. [RFC 4443 §4.1]
        129:
          label: Echo Reply
          doc: Reply to an Echo Request (ping reply). [RFC 4443 §4.2]
        135:
          label: Neighbor Solicitation
          doc: NDP Neighbor Solicitation — IPv6 equivalent of ARP request. [RFC 4861]
        136:
          label: Neighbor Advertisement
          doc: NDP Neighbor Advertisement — IPv6 equivalent of ARP reply. [RFC 4861]
    category: type
    doc: ICMPv6 message type. Values 0-127 are error messages, 128-255 are informational. This preset describes the Echo Request/Reply layout (Type 128 / Type 129). [RFC 4443]
  - id: code
    name: Code
    type:
      kind: bits
      n: 8
    category: type
    doc: "Sub-type refining the Type. 0 for Echo Request/Reply; for Type=1 (Destination Unreachable): 0=no route, 3=address unreachable, 4=port unreachable."
  - id: checksum
    name: Checksum
    type:
      kind: bits
      n: 16
    category: checksum
    doc: 16-bit one's-complement checksum over the ICMPv6 message plus an IPv6 pseudo-header (src/dst, length, next header). Mandatory in IPv6. [RFC 4443 §2.3]
  - id: identifier
    name: Identifier
    type:
      kind: bits
      n: 16
    category: identifier
    doc: Echo identifier — lets the sender pair replies with outstanding requests; commonly the ping process's PID.
  - id: sequence
    name: Sequence Number
    type:
      kind: bits
      n: 16
    category: identifier
    doc: Echo sequence number — incremented per ping so dropped responses are visible.
