# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: IPv6 Hop-by-Hop Options Extension Header
rowBits: 32
byteOrder: BE
description: IPv6 Hop-by-Hop Options Extension Header (RFC 8200 §4.3). Carried in every packet and processed by every node along the delivery path.
meta:
  family: ip
  tags: [internet-layer, encapsulation, control-plane]
body:
  - { id: nextHeader, name: Next Header, type: { kind: int, bits: 8 }, category: type, doc: "Identifies the type of header immediately following this extension header." }
  - { id: hdrExtLen, name: Hdr Ext Len, type: { kind: int, bits: 8 }, category: length, doc: "Length of the Hop-by-Hop Options header in 8-octet units, not including the first 8 octets." }
  - id: options
    name: Options
    type:
      kind: bytes
      n: { kind: op, op: "-", a: { kind: op, op: "*", a: { kind: op, op: "+", a: { kind: ref, field: "hdrExtLen" }, b: { kind: lit, value: 1 } }, b: { kind: lit, value: 8 } }, b: { kind: lit, value: 2 } }
    category: variable
    doc: "Variable-length field containing one or more TLV-encoded options; padded to make the total header length a multiple of 8 octets."
