# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: GIST (General Internet Signalling Transport)
rowBits: 32
byteOrder: BE
description: "General Internet Signalling Transport (GIST, also known as NSIS Transport Layer Protocol – NTLP) message format (RFC 5971). GIST provides a generic transport layer for the Next Steps In Signaling (NSIS) framework, carrying signalling messages for NSIS Signalling Layer Protocols (NSLPs) along the path between network nodes. Every GIST message begins with an 8-byte common header: Version (8 bits), GIST Hops (8 bits), Message Length (16 bits), NSLP Identifier (16 bits), C-flag (1 bit), Message Type (7 bits), S/R/E flags (1 bit each), and Reserved (5 bits). The header is followed by a sequence of Type-Length-Value (TLV) Objects conveying signalling state, routing, and control information."

body:
  - kind: group
    id: gistCommonHeader
    name: GIST Common Header
    children:
      - id: gistVersion
        name: Version
        type: { kind: int, bits: 8 }
        category: type
        defaultValue: 1
        doc: "GIST protocol version. MUST be 1 for this specification. A node receiving a GIST message with an unrecognised version MUST silently discard it. [RFC 5971 §8.1]"

      - id: gistHops
        name: GIST Hops
        type: { kind: int, bits: 8 }
        category: variable
        doc: "Remaining GIST hop count. Decremented by each GIST node that forwards the message. When a node receives a message with GIST Hops equal to 0, it MUST NOT forward it further and MUST generate an error if the message has not yet reached its destination. Functions similarly to IP TTL for GIST-level hop limiting. [RFC 5971 §8.1]"

      - id: gistMessageLength
        name: Message Length
        type: { kind: int, bits: 16 }
        category: length
        doc: "The total number of 32-bit words in the message after the common header itself, i.e. covering all TLV objects that follow the 8-byte (2-word) common header (the common header is NOT counted). A receiver MUST discard a message whose indicated length exceeds the available data. [RFC 5971 §8.1, App. A.1]"

  - kind: group
    id: gistTypeBlock
    name: Message Type / C-flag
    children:
      - id: gistNslpId
        name: NSLP Identifier
        type: { kind: int, bits: 16 }
        category: identifier
        doc: "NSLP Identifier (NSLPID). Identifies the NSIS Signalling Layer Protocol that is the target of this GIST message. Assigned values are maintained by IANA. A value of 0 is reserved for GIST itself (e.g., error messages not associated with any NSLP). [RFC 5971 §8.1]"

      - id: gistCFlag
        name: C
        type: { kind: int, bits: 1 }
        category: flags
        defaultValue: 0
        doc: "C (Control) flag. When set to 1, the message is a GIST control message (e.g., Query, Response, Confirm, MA-Hello) that is processed by the GIST layer itself. When 0, the message carries an NSLP payload to be delivered to the signalling application identified by NSLPID. [RFC 5971 §8.1]"

      - id: gistType
        name: Type
        type:
          kind: enum
          bits: 7
          variants:
            0: "Query"
            1: "Response"
            2: "Confirm"
            3: "Data"
            4: "Error"
            5: "MA-Hello"
        category: type
        doc: "GIST message type. GIST has six message types: 0=Query (initiate path-coupled association), 1=Response (reply to Query), 2=Confirm (complete three-way handshake), 3=Data (carry NSLP payload along an existing association), 4=Error (report a GIST-level error condition), 5=MA-Hello (keepalive on a Messaging Association; a reply to an MA-Hello with R=1 is simply another MA-Hello). Values 6–127 are reserved. [RFC 5971 §5.2.1, §8.1]"

      - id: gistSFlag
        name: S
        type: { kind: int, bits: 1 }
        category: flags
        defaultValue: 0
        doc: "S (Source addressing) flag. Set to 1 if the IP source address of the message is the same as the source address used for the signalling flow it refers to. [RFC 5971 App. A.1]"

      - id: gistRFlag
        name: R
        type: { kind: int, bits: 1 }
        category: flags
        defaultValue: 0
        doc: "R (Response requested) flag. Set to 1 if a reply to this message is explicitly requested. It MAY be set in an MA-Hello; if set, another MA-Hello MUST be sent in reply. [RFC 5971 App. A.1]"

      - id: gistEFlag
        name: E
        type: { kind: int, bits: 1 }
        category: flags
        defaultValue: 0
        doc: "E (Explicit routing) flag. Set to 1 if the message was explicitly routed. [RFC 5971 App. A.1]"

      - id: gistReserved
        name: Reserved
        type: { kind: int, bits: 5 }
        category: reserved
        doc: "Reserved field (5 bits). MUST be set to zero by the sender and ignored by the receiver. [RFC 5971 App. A.1]"

  - kind: bounded
    id: gistObjectList
    name: TLV Object List
    bytes: { kind: op, op: "*", a: { kind: ref, field: gistMessageLength }, b: { kind: lit, value: 4 } }
    doc: "The extent of the TLV object list is derived from the common-header Message Length, which gives the total number of 32-bit words after the common header. The list spans Message Length * 4 bytes; a parser consumes objects until that many bytes have been read. GIST carries no explicit object count field. [RFC 5971 App. A.1]"
    fields:
      - kind: repeat
        id: gistObjects
        name: TLV Objects
        category: variable
        element:
          id: gistObject
          fields:
            - id: gistObjType
              name: Object Type
              type: { kind: int, bits: 16 }
              category: type
              doc: "GIST TLV object header first 16 bits: A(1)|B(1)|r(1)|r(1)|Type(12). The two high bits (A, B) are extensibility flags governing treatment of an object whose Type is unknown at the receiver: AB=00 ('Mandatory') reject the whole message with an Object Type Error; AB=01 ('Ignore') delete the object and process the rest of the message; AB=10 ('Forward') retain the object unchanged in any forwarded message but do not store it locally; AB=11 is reserved and an object carrying it MUST be rejected (Invalid Extensibility Flags). The next two bits are reserved; the low 12 bits are the IANA-assigned object Type. Assigned types: 0=Message Routing Information (MRI), 1=Session ID, 2=Network Layer Information (NLI), 3=Stack Proposal, 4=Stack Configuration Data (SCD), 5=Query-Cookie, 6=Responder-Cookie, 7=NAT Traversal, 8=NSLP Data, 9=Error, 10=Hello ID. [RFC 5971 §8.2, App. A.2, A.2.1]"
            - id: gistObjReserved
              name: Reserved
              type: { kind: int, bits: 4 }
              category: reserved
              doc: "Reserved bits (r|r|r|r) preceding the 12-bit Object Length in the second half of the TLV header. MUST be set to zero by the sender and ignored by the receiver. [RFC 5971 App. A.2]"
            - id: gistObjLen
              name: Object Length
              type: { kind: int, bits: 12 }
              category: length
              doc: "Length of the Object Value in 32-bit words, NOT including the 4-byte Object Type/Length header. Value is a whole number of 32-bit words, so its byte length is Object Length * 4; if there is no Value, Length = 0. A receiver MUST skip any object whose type is unrecognised using this field to advance past the value. [RFC 5971 App. A.2]"
            - id: gistObjValue
              name: Object Value
              type: { kind: bytes, n: { kind: op, op: "*", a: { kind: ref, field: gistObjLen }, b: { kind: lit, value: 4 } } }
              category: variable
              doc: "Object value bytes, exactly gistObjLen * 4 bytes (Object Length counts 32-bit words). Interpretation depends on Object Type. MRI (0): Message Routing Information encoding the signalling path (flow 5-tuple or explicit route). Session ID (1): cryptographically random identifier for the signalling session. NLI (2): Network Layer Information (peer node address, interface, peer identity, routing-state lifetime). Stack Proposal (3): ordered list of transport/security protocol stacks for Messaging Association negotiation. SCD (4): Stack Configuration Data — parameters for a proposed protocol stack (MA setup). Query-Cookie (5): opaque value chosen by the querier for replay protection. Responder-Cookie (6): opaque value chosen by the responder. NAT Traversal (7): information for traversing Network Address Translators. NSLP Data (8): opaque payload to be delivered to the NSLP identified by NSLPID. Error (9): GIST-level error report. Hello ID (10): identifier used in MA-Hello keepalive exchanges. [RFC 5971 §8.2 / §8.3]"
        count: eos
