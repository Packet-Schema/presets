# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: IPv6 Fragment Extension Header
rowBits: 32
byteOrder: BE
description: IPv6 Fragment Extension Header (RFC 8200 §4.5). Fixed 8 bytes; used to carry fragmentation information when an IPv6 source node needs to send a packet larger than the path MTU.
meta:
  family: ip
  tags: [internet-layer, encapsulation, data-transfer]
body:
  - id: nextHeader
    name: Next Header
    type: { kind: int, bits: 8 }
    category: type
    doc: IP Protocol Number identifying the type of the header immediately following the Fragment Extension Header (e.g. 6=TCP, 17=UDP, 58=ICMPv6). Uses the same IANA numbering as IPv4 Protocol. [RFC 8200 §4.5]
  - id: reserved
    name: Reserved
    type: { kind: int, bits: 8 }
    category: reserved
    doc: Reserved field. MUST be set to zero by the originator and MUST be ignored by the receiver. [RFC 8200 §4.5]
  - kind: group
    id: offsetAndFlags
    name: Offset and Flags
    children:
      - id: fragmentOffset
        name: Fragment Offset
        type: { kind: bits, n: 13 }
        category: identifier
        doc: Offset, in 8-byte units, of the data following this header relative to the start of the fragmentable part of the original packet. The first fragment has an offset of 0. [RFC 8200 §4.5]
      - id: res
        name: Res
        type: { kind: bits, n: 2 }
        category: reserved
        doc: Reserved. MUST be set to zero on transmission and MUST be ignored on receipt. [RFC 8200 §4.5]
      - id: m
        name: M
        type: { kind: bits, n: 1 }
        category: flags
        doc: More Fragments flag. Set to 1 when more fragments follow; set to 0 on the last (or only) fragment of the original packet. [RFC 8200 §4.5]
  - id: identification
    name: Identification
    type: { kind: int, bits: 32 }
    category: identifier
    doc: Per-packet unique value generated by the source node, used together with the source and destination addresses to identify all fragments belonging to the same original packet for reassembly at the destination. [RFC 8200 §4.5]
