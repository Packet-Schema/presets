# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: TLS Extensions Block
rowBits: 32
byteOrder: BE
description: TLS 1.3 extensions block (RFC 8446 §4.2) modeled as a Repeat<Switch> where the Switch discriminator is a peek(16) of the extension_type word. The peek is non-consuming so each case re-reads the same 16-bit field as its first member. Every extension is struct { extension_type (u16); opaque extension_data<0..2^16-1> }, so each case reads extension_type then a 2-byte extension_data length before the body. Demonstrates the PSDL 0.5 lookahead Switch.
body:
  - kind: repeat
    id: extensions
    name: Extensions
    category: variable
    element:
      id: extensionRecord
      fields:
        - kind: switch
          id: byPeekedType
          on:
            kind: peek
            bits: 16
          cases:
            "0":
              id: sniExt
              fields:
                - id: extensionType
                  name: extension_type=0
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: ExtensionType discriminator identifying this extension. 0 = server_name (SNI), letting the client tell the server which virtual host it wants so the right certificate is selected. [RFC 8446 §4.2, RFC 6066 §3]
                - id: extensionDataLength
                  name: extension_data length
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Byte length of this extension's extension_data, the outer length prefix that every TLS Extension carries immediately after extension_type. Bounds the entire SNI body that follows. [RFC 8446 §4.2]
                - id: serverNameListLength
                  name: server_name_list length
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Byte length of the following ServerNameList. Bounds the list so a parser knows where this extension's data ends. [RFC 6066 §3]
                - id: serverNameList
                  name: server_name_list
                  type:
                    kind: bytes
                    n:
                      kind: ref
                      field: serverNameListLength
                  category: addressing
                  doc: The ServerNameList itself. Each entry carries a NameType and a name; type 0 (host_name) holds the target hostname as a UTF-8 string. [RFC 6066 §3]
            "16":
              id: alpnExt
              fields:
                - id: extensionType
                  name: extension_type=16
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: ExtensionType discriminator. 16 = application_layer_protocol_negotiation (ALPN), used to negotiate the upper-layer protocol (e.g. h2, http/1.1) during the handshake. [RFC 8446 §4.2, RFC 7301]
                - id: extensionDataLength
                  name: extension_data length
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Byte length of this extension's extension_data, the outer length prefix every TLS Extension carries after extension_type. Bounds the entire ALPN body that follows. [RFC 8446 §4.2]
                - id: protocolNameListLength
                  name: protocol_name_list length
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Byte length of the following ProtocolNameList, bounding the set of protocol identifiers offered. [RFC 7301 §3.1]
                - id: alpnProtocols
                  name: alpn_protocols
                  type:
                    kind: bytes
                    n:
                      kind: ref
                      field: protocolNameListLength
                  category: type
                  doc: The ProtocolNameList — a sequence of length-prefixed protocol name strings (e.g. "h2", "http/1.1") in the client's order of preference. [RFC 7301 §3.1]
            "43":
              id: supportedVersionsExt
              fields:
                - id: extensionType
                  name: extension_type=43
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: ExtensionType discriminator. 43 = supported_versions, how a client offers the TLS versions it supports; its presence is what signals TLS 1.3 (0x0304). [RFC 8446 §4.2.1]
                - id: extensionDataLength
                  name: extension_data length
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Byte length of this extension's extension_data, the outer length prefix every TLS Extension carries after extension_type. For supported_versions in a ClientHello this is the single-byte versions-list-length plus the version entries. [RFC 8446 §4.2]
                - id: supportedVersionsLength
                  name: SupportedVersions length
                  type:
                    kind: bits
                    n: 8
                  category: length
                  doc: Byte length of the following list of versions (a single-byte count, since the list is short). [RFC 8446 §4.2.1]
                - id: versions
                  name: versions
                  type:
                    kind: bytes
                    n:
                      kind: ref
                      field: supportedVersionsLength
                  category: type
                  doc: List of 16-bit ProtocolVersion values in the client's preference order; 0x0304 denotes TLS 1.3. [RFC 8446 §4.2.1]
            "51":
              id: keyShareExt
              fields:
                - id: extensionType
                  name: extension_type=51
                  type:
                    kind: bits
                    n: 16
                  category: type
                  doc: ExtensionType discriminator. 51 = key_share, carrying the (EC)DHE public key shares that let TLS 1.3 establish the shared secret within the handshake. [RFC 8446 §4.2.8]
                - id: extensionDataLength
                  name: extension_data length
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Byte length of this extension's extension_data, the outer length prefix every TLS Extension carries after extension_type. Bounds the entire key_share body that follows. [RFC 8446 §4.2]
                - id: clientSharesLength
                  name: client_shares length
                  type:
                    kind: bits
                    n: 16
                  category: length
                  doc: Byte length of the following list of KeyShareEntry values offered by the client. [RFC 8446 §4.2.8]
                - id: keyShareEntry
                  name: KeyShareEntry
                  type:
                    kind: bytes
                    n:
                      kind: ref
                      field: clientSharesLength
                  category: identifier
                  doc: One or more KeyShareEntry values, each pairing a NamedGroup (e.g. x25519, secp256r1) with that group's key_exchange public value. [RFC 8446 §4.2.8]
    count: eos
