# yaml-language-server: $schema=../node_modules/@packet-schema/core/schemas/psdl-0.5.yaml
version: "0.5"
name: PPPoE (RFC 2516)
rowBits: 32
byteOrder: BE
description: Point-to-Point Protocol over Ethernet (RFC 2516). PPPoE encapsulates PPP frames within Ethernet frames and provides a standard method for tunneling PPP over Ethernet. The header is 6 bytes — a nibble each for Version and Type (both always 1), an 8-bit Code identifying the packet role in the discovery or session phase, a 16-bit Session ID (non-zero only during the session phase), and a 16-bit payload length. Discovery phase uses Code values 0x09 (PADI), 0x07 (PADO), 0x19 (PADR), 0x65 (PADS), and 0xa7 (PADT); each carries a chain of TLV Tags. The session-data packet (Code 0x00) is followed by a PPP payload rather than Tags.
body:
  - kind: group
    id: pppoeHeader
    name: PPPoE Header
    children:
      - kind: group
        id: verType
        name: Ver+Type
        children:
          - id: ver
            name: Version
            type: { kind: int, bits: 4 }
            category: type
            defaultValue: 1
            doc: PPPoE version number. MUST be set to 0x1 by both the PPPoE Host and Access Concentrator. A received packet with any other Version MUST be silently discarded. [RFC 2516 §6]
          - id: type
            name: Type
            type: { kind: int, bits: 4 }
            category: type
            defaultValue: 1
            doc: PPPoE type indicator. MUST be set to 0x1 by both the Host and Access Concentrator. A received packet with any other Type MUST be silently discarded. [RFC 2516 §6]
      - id: code
        name: Code
        type:
          kind: enum
          bits: 8
          variants:
            0: Session Data (0x00)
            9: PADI — Active Discovery Initiation (0x09)
            7: PADO — Active Discovery Offer (0x07)
            25: PADR — Active Discovery Request (0x19)
            101: PADS — Active Discovery Session-confirmation (0x65)
            167: PADT — Active Discovery Terminate (0xa7)
        category: type
        doc: "PPPoE packet type code. 0x00 = Session Data (PPP payload follows, no Tags); 0x09 = PADI (broadcast by Host to discover Access Concentrators); 0x07 = PADO (unicast reply from AC); 0x19 = PADR (Host selects one AC); 0x65 = PADS (AC confirms session, assigns Session-ID); 0xa7 = PADT (either side terminates session). [RFC 2516 §5 / §6]"
      - id: sessionId
        name: Session ID
        type: { kind: int, bits: 16 }
        category: identifier
        doc: 16-bit unsigned session identifier assigned by the Access Concentrator in the PADS packet. MUST be 0x0000 in all discovery packets (PADI, PADO, PADR, PADT before session); MUST be non-zero and consistent in all Session-Data packets after PADS. The value 0xffff is reserved. [RFC 2516 §6]
      - id: payloadLength
        name: Length
        type: { kind: int, bits: 16 }
        category: length
        doc: Length in octets of the PPPoE payload, not including the 6-byte PPPoE header. For discovery packets this is the total byte count of all Tags. For Session Data (Code=0x00) it is the length of the encapsulated PPP frame. [RFC 2516 §6]
  - kind: bounded
    id: pppoePayload
    name: PPPoE Payload
    bytes: { kind: ref, field: payloadLength }
    doc: The PPPoE payload region, exactly Length octets (the value of the header Length field). For discovery packets (PADI, PADO, PADR, PADS, PADT) this region holds a chain of TLV Tags; for Session Data packets (Code=0x00) it holds the encapsulated PPP frame instead. [RFC 2516 §6]
    fields:
      - kind: repeat
        id: pppoeTagList
        name: PPPoE Tags
        category: variable
        doc: Chain of TLV Tag records carried in PPPoE discovery packets (PADI, PADO, PADR, PADS, PADT). The list fills the Length-bounded payload region; each record contains a 16-bit Tag-Type, a 16-bit Tag-Length, and a variable-length Tag-Value. Well-known Tag types include 0x0101 (Service-Name), 0x0102 (AC-Name), 0x0103 (Host-Uniq), 0x0104 (AC-Cookie), 0x0105 (Vendor-Specific), 0x0110 (Relay-Session-Id), 0x0201 (Service-Name-Error), 0x0202 (AC-System-Error), 0x0203 (Generic-Error), and 0x0000 (End-Of-List). For Session Data packets (Code=0x00) no Tags are present and the PPP payload occupies this region instead. [RFC 2516 §5]
        count: eos
        element:
          id: pppoeTag
          fields:
            - id: tagType
              name: Tag Type
              type: { kind: int, bits: 16 }
              category: type
              doc: Identifies the Tag. 0x0000=End-Of-List (Tag-Length MUST be 0, no more Tags follow); 0x0101=Service-Name (UTF-8 service description, empty means any service); 0x0102=AC-Name (Access Concentrator name); 0x0103=Host-Uniq (arbitrary binary cookie for request/reply correlation); 0x0104=AC-Cookie (set by AC to prevent DoS); 0x0105=Vendor-Specific; 0x0110=Relay-Session-Id; 0x0201=Service-Name-Error; 0x0202=AC-System-Error; 0x0203=Generic-Error. Unknown Tags with the high bit of the high byte clear (0x0xxx) MUST be ignored; unknown Tags with the high bit set MUST cause an error. [RFC 2516 §5]
            - id: tagLength
              name: Tag Length
              type: { kind: int, bits: 16 }
              category: length
              doc: Length in octets of the Tag-Value field that follows. 0x0000 for the End-Of-List Tag (which has no Value field) and for Service-Name when the Host will accept any offered service. [RFC 2516 §5]
            - id: tagValue
              name: Tag Value
              type: { kind: bytes, n: { kind: ref, field: tagLength } }
              category: variable
              doc: Tag Value bytes, exactly Tag-Length octets. Interpretation is Tag-Type dependent — UTF-8 string for Service-Name and AC-Name, opaque binary for Host-Uniq and AC-Cookie. Absent (zero bytes) when Tag-Length is 0. [RFC 2516 §5]
